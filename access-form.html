<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H7BFLVL4F5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H7BFLVL4F5');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Complete Your Application</title>
  <meta name="description" content="Complete your Presttige application." />

  <style>
    :root {
      --bg: #050505;
      --panel: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #f4f1eb;
      --muted: rgba(244,241,235,0.72);
      --accent: #d1ae72;
      --danger: #ffb4b4;
      --max: 860px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    input, textarea, select, button {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .panel {
      width: min(100%, var(--max));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 38px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2.3rem, 6vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      margin-bottom: 18px;
    }

    .intro {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.02rem;
      max-width: 720px;
      margin-bottom: 28px;
    }

    .form {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.94rem;
      color: rgba(244,241,235,0.86);
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 14px;
      outline: none;
      padding: 14px 16px;
      min-height: 54px;
    }

    .field textarea {
      min-height: 130px;
      resize: vertical;
      padding-top: 14px;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(209,174,114,0.78);
      box-shadow: 0 0 0 3px rgba(209,174,114,0.12);
    }

    .field small {
      display: block;
      color: rgba(244,241,235,0.45);
      margin-top: 7px;
      line-height: 1.5;
      font-size: 0.84rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn-primary {
      border: none;
      background: linear-gradient(135deg, #cfa96a 0%, #e1c28d 100%);
      color: #0d0d0d;
      font-weight: 600;
      box-shadow: 0 12px 28px rgba(209,174,114,0.22);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-1px);
    }

    .btn-primary:disabled,
    .btn-secondary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      min-height: 24px;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .message.success {
      color: var(--accent);
    }

    .message.error {
      color: var(--danger);
    }

    @media (max-width: 760px) {
      .panel {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="eyebrow">Step 2</div>
      <h1>Complete Your Application</h1>
      <p class="intro">
        Your email has been verified. Complete the next stage of your Presttige application below.
        All applications are reviewed privately and individually.
      </p>

      <form class="form" id="accessForm" novalidate>
        <input type="hidden" id="leadId" />

        <div class="grid-2">
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" type="tel" autocomplete="tel" required />
            <small>Include country code.</small>
          </div>

          <div class="field">
            <label for="age">Age</label>
            <input id="age" type="text" inputmode="numeric" required />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="city">City</label>
            <input id="city" type="text" autocomplete="address-level2" required />
          </div>

          <div class="field">
            <label for="instagram">Instagram</label>
            <input id="instagram" type="text" placeholder="@username or full URL" required />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="linkedin">LinkedIn</label>
            <input id="linkedin" type="text" placeholder="Profile URL" required />
          </div>

          <div class="field">
            <label for="occupation">Occupation <span style="color:rgba(244,241,235,0.45)">(optional)</span></label>
            <input id="occupation" type="text" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="company">Company <span style="color:rgba(244,241,235,0.45)">(optional)</span></label>
            <input id="company" type="text" />
          </div>

          <div class="field">
            <label for="website">Website <span style="color:rgba(244,241,235,0.45)">(optional)</span></label>
            <input id="website" type="url" placeholder="https://..." />
          </div>
        </div>

        <div class="field">
          <label for="tiktok">TikTok <span style="color:rgba(244,241,235,0.45)">(optional)</span></label>
          <input id="tiktok" type="text" placeholder="@username or full URL" />
        </div>

        <div class="field">
          <label for="bio">Short Introduction</label>
          <textarea id="bio" required></textarea>
        </div>

        <div class="field">
          <label for="why">Why do you want access to Presttige?</label>
          <textarea id="why" required></textarea>
        </div>

        <div class="actions">
          <button id="submitBtn" class="btn-primary" type="submit">Submit Application</button>
          <a class="btn-secondary" href="/">Return to Presttige</a>
        </div>

        <div id="formMessage" class="message"></div>
      </form>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const leadId = params.get('lead_id') || params.get('leadId') || '';
    document.getElementById('leadId').value = leadId;

    function setMessage(text, type) {
      const el = document.getElementById('formMessage');
      el.textContent = text || '';
      el.className = 'message' + (type ? ' ' + type : '');
    }

    function validLeadId(id) {
      return typeof id === 'string' && /^fdm_[A-Za-z0-9]+$/.test(id);
    }

    if (!validLeadId(leadId)) {
      setMessage('Invalid or missing application reference.', 'error');
      document.getElementById('submitBtn').disabled = true;
    } else {
      gtag('event', 'begin_form_step_2', {
        application_type: 'access',
        page_location: window.location.href,
        lead_id_present: true
      });
    }

    document.getElementById('accessForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      if (!validLeadId(leadId)) {
        setMessage('Invalid or missing application reference.', 'error');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');

      const payload = {
        lead_id: leadId,
        phone: document.getElementById('phone').value.trim(),
        age: document.getElementById('age').value.trim(),
        city: document.getElementById('city').value.trim(),
        instagram: document.getElementById('instagram').value.trim(),
        linkedin: document.getElementById('linkedin').value.trim(),
        occupation: document.getElementById('occupation').value.trim(),
        company: document.getElementById('company').value.trim(),
        website: document.getElementById('website').value.trim(),
        tiktok: document.getElementById('tiktok').value.trim(),
        bio: document.getElementById('bio').value.trim(),
        why: document.getElementById('why').value.trim()
      };

      if (!payload.phone || !payload.age || !payload.city || !payload.instagram || !payload.linkedin || !payload.bio || !payload.why) {
        setMessage('Please complete the required fields.', 'error');
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
        setMessage('Submitting application...', '');

        gtag('event', 'submit_form_step_2', {
          application_type: 'access',
          page_location: window.location.href
        });

        const response = await fetch('https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/prod/submit-access', {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const rawText = await response.text();
        let parsed = null;

        try {
          parsed = rawText ? JSON.parse(rawText) : null;
        } catch (e) {
          parsed = rawText;
        }

        if (!response.ok) {
          const backendMessage =
            (parsed && typeof parsed === 'object' && (parsed.message || parsed.error)) ||
            `Request failed (${response.status})`;
          throw new Error(backendMessage);
        }

        gtag('event', 'application_completed', {
          application_type: 'access',
          page_location: window.location.href
        });

        setMessage('Application submitted successfully.', 'success');

        setTimeout(() => {
          window.location.replace('https://presttige.net/thank-you.html');
        }, 900);

      } catch (error) {
        const message = error && error.message ? error.message : 'Submission failed.';

        if (
          message.includes('Failed to fetch') ||
          message.includes('Load failed') ||
          message.includes('NetworkError')
        ) {
          setMessage('Network/CORS error. The API is not allowing the website request yet.', 'error');
        } else {
          setMessage(message, 'error');
        }

        console.error('Presttige submit access error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
      }
    });
  </script>
</body>
</html>
