<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Welcome</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-primary: #0A0A0A;
      --pp-paper: #FBF9F4;
      --pp-background: #F5F2ED;
      --pp-accent: #8C7040;
      --pp-hairline: #D9D2C5;
      --pp-muted: #4A4A4A;
      --pp-error: #9f1d1d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--pp-background);
      color: var(--pp-primary);
      font-family: "Source Serif Pro", Georgia, serif;
      padding: 20px;
    }
    .card {
      width: min(100%, 720px);
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
      border-radius: 12px;
      padding: 40px 32px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .title {
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(42px, 7vw, 64px);
      font-style: italic;
      font-weight: 500;
      line-height: 0.95;
    }
    .copy {
      margin: 0;
      color: var(--pp-muted);
      font-size: 17px;
      line-height: 1.8;
    }
    .error {
      color: var(--pp-error);
    }
  </style>
</head>
<body>
  <section id="app" class="card">
    <p class="eyebrow">Presttige Membership</p>
    <h1 class="title">Welcome</h1>
    <p class="copy">Verifying your access…</p>
  </section>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com";
      const app = document.getElementById("app");
      const token = window.location.pathname.split("/").filter(Boolean).pop();

      if (!token || token === "welcome" || token === "welcome.html") {
        renderError("Missing access token.");
        return;
      }

      verify();

      async function verify() {
        try {
          const response = await fetch(`${API_BASE}/magic-link-verify?token=${encodeURIComponent(token)}`);
          const data = await response.json();

          if (!response.ok) {
            renderError(data.error || "This link has been used or expired.");
            return;
          }

          renderSuccess(data);
        } catch (error) {
          renderError("Unable to verify your access right now.");
        }
      }

      function renderSuccess(data) {
        const tier = formatTier(data.tier);
        app.innerHTML = `
          <p class="eyebrow">Presttige Membership</p>
          <h1 class="title">Welcome, ${escapeHtml(data.name || "Member")}.</h1>
          <p class="copy">Your ${escapeHtml(tier)} membership is active. Payment status: ${escapeHtml(data.payment_status || "active")}.</p>
        `;
      }

      function renderError(message) {
        app.innerHTML = `
          <p class="eyebrow">Presttige Membership</p>
          <h1 class="title">Link unavailable.</h1>
          <p class="copy error">${escapeHtml(message)}</p>
        `;
      }

      function formatTier(tier) {
        const mapping = {
          patron: "Presttige Patron",
          tier2: "Presttige Tier 2",
          tier3: "Presttige Tier 3",
          free: "Presttige Free Membership"
        };
        return mapping[tier] || "Presttige";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
