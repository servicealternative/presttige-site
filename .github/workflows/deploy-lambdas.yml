name: Deploy Lambdas to AWS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "shared/**"
      - "scripts/package-*.sh"
      - ".github/workflows/deploy-lambdas.yml"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.changes.outputs.lambdas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED="ALL"
          else
            CHANGED="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")"
          fi

          echo "Changed files:"
          echo "$CHANGED"

          LAMBDAS=()

          if [ "$CHANGED" = "ALL" ] || echo "$CHANGED" | grep -q "^.github/workflows/deploy-lambdas.yml$"; then
            LAMBDAS=(
              "presttige-create-lead"
              "presttige-verify-email"
              "presttige-submit-access"
              "presttige-review-action"
              "presttige-stripe-webhook"
              "presttige-gateway"
            )
          else
            if echo "$CHANGED" | grep -qE "^(backend/lambdas/create-lead/|backend/email_utils\.py|backend/email/|shared/|scripts/package-presttige-create-lead\.sh)"; then
              LAMBDAS+=("presttige-create-lead")
            fi

            if echo "$CHANGED" | grep -qE "^(backend/lambdas/verify-email/|shared/|scripts/package-presttige-verify-email\.sh)"; then
              LAMBDAS+=("presttige-verify-email")
            fi

            if echo "$CHANGED" | grep -qE "^(backend/lambdas/submit-access/|shared/|scripts/package-presttige-submit-access\.sh)"; then
              LAMBDAS+=("presttige-submit-access")
            fi

            if echo "$CHANGED" | grep -qE "^(backend/lambdas/review-action/|scripts/package-presttige-review-action\.sh)"; then
              LAMBDAS+=("presttige-review-action")
            fi

            if echo "$CHANGED" | grep -qE "^(backend/lambdas/stripe-webhook/|shared/|scripts/package-presttige-stripe-webhook\.sh)"; then
              LAMBDAS+=("presttige-stripe-webhook")
            fi

            if echo "$CHANGED" | grep -qE "^(backend/lambdas/gateway/|shared/|scripts/package-presttige-gateway\.sh)"; then
              LAMBDAS+=("presttige-gateway")
            fi
          fi

          if [ ${#LAMBDAS[@]} -gt 0 ]; then
            mapfile -t LAMBDAS < <(printf "%s\n" "${LAMBDAS[@]}" | sort -u)
          fi

          echo "Lambdas to deploy: ${LAMBDAS[*]:-none}"

          if [ ${#LAMBDAS[@]} -eq 0 ]; then
            echo "lambdas=[]" >> "$GITHUB_OUTPUT"
          else
            echo "lambdas=$(printf '%s\n' "${LAMBDAS[@]}" | jq -R . | jq -s -c .)" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.lambdas != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.detect-changes.outputs.lambdas) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::343218208384:role/presttige-github-actions-deploy
          aws-region: us-east-1

      - name: Package Lambda
        run: bash scripts/package-${{ matrix.lambda }}.sh

      - name: Capture pre-deploy CodeSha256
        id: pre
        run: |
          PRE_SHA=$(aws lambda get-function-configuration \
            --function-name ${{ matrix.lambda }} \
            --region us-east-1 \
            --query CodeSha256 --output text)
          echo "sha=$PRE_SHA" >> "$GITHUB_OUTPUT"
          echo "Pre-deploy CodeSha256: $PRE_SHA"

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda }} \
            --zip-file fileb:///tmp/${{ matrix.lambda }}-package.zip \
            --region us-east-1 \
            --no-cli-pager

      - name: Wait for Lambda update completion
        run: |
          aws lambda wait function-updated \
            --function-name ${{ matrix.lambda }} \
            --region us-east-1

      - name: Verify deploy
        run: |
          POST_SHA=$(aws lambda get-function-configuration \
            --function-name ${{ matrix.lambda }} \
            --region us-east-1 \
            --query CodeSha256 --output text)

          echo "Post-deploy CodeSha256: $POST_SHA"

          if [ "$POST_SHA" = "${{ steps.pre.outputs.sha }}" ]; then
            echo "::warning::CodeSha256 unchanged for ${{ matrix.lambda }} (may indicate identical code)"
          else
            echo "::notice::${{ matrix.lambda }} deployed successfully: ${{ steps.pre.outputs.sha }} -> $POST_SHA"
          fi

      - name: Publish version
        run: |
          aws lambda publish-version \
            --function-name ${{ matrix.lambda }} \
            --description "Deploy from commit ${{ github.sha }}" \
            --region us-east-1 \
            --no-cli-pager || echo "::warning::Version publish failed (non-blocking)"
