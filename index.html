<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    p {
      color: #b5b5b5;
      margin-bottom: 40px;
    }

    /* BUTTON STYLE */
    .founder-btn {
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid rgba(212, 176, 106, 0.55);
      background: linear-gradient(135deg, #e0bf7a 0%, #cfa85c 100%);
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .founder-btn:hover {
      transform: translateY(-1px);
    }

    /* DISABLED STATE */
    .founder-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Presttige</h1>
    <p>Private. Selective. Prestigious.</p>

    <!-- DISABLED BUTTON -->
    <button class="founder-btn disabled">
      Become a Founder — Private Release
    </button>
  </div>

  <!-- PAYMENT FEEDBACK -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const payment = params.get("payment");

    if (payment === "success") {
      alert("Payment successful. Welcome to Presttige.");
    }

    if (payment === "cancel") {
      alert("Payment cancelled.");
    }
  </script>

</body>
</html>
