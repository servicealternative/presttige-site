<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Request Access</title>
  <style>
    :root{
      --bg:#0b0b0c;
      --panel:#111111;
      --text:#f5f5f5;
      --muted:#b7b7b7;
      --gold:#d4b06a;
      --line:rgba(255,255,255,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:72px 20px 60px;
    }

    .brand{
      text-align:center;
      font-size:1.8rem;
      letter-spacing:.18em;
      color:var(--gold);
      margin-bottom:28px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 24px;
    }

    h1{
      margin:0 0 10px;
      text-align:center;
      font-size:2.3rem;
      letter-spacing:-.03em;
      font-weight:600;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      line-height:1.7;
      margin:0 0 28px;
    }

    label{
      display:block;
      margin:0 0 8px;
      font-size:.95rem;
      color:#e8e8e8;
    }

    input{
      width:100%;
      padding:15px 16px;
      margin:0 0 18px;
      border:1px solid var(--line);
      background:#171717;
      color:#fff;
      border-radius:12px;
      font:inherit;
      outline:none;
    }

    input:focus{
      border-color:rgba(212,176,106,.55);
    }

    button{
      width:100%;
      padding:15px 16px;
      border:none;
      border-radius:12px;
      background:var(--gold);
      color:#111;
      font:inherit;
      font-weight:700;
      cursor:pointer;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .message{
      margin-top:22px;
      text-align:center;
      line-height:1.8;
      color:var(--muted);
      display:none;
    }

    .error{
      margin-top:16px;
      text-align:center;
      color:#ff8f8f;
      display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">PRESTTIGE</div>

    <div class="card">
      <h1>Request Access</h1>
      <p class="subtitle">
        Private. Selective. Prestigious.
      </p>

      <form id="applyForm">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="instagram">Instagram username</label>
        <input id="instagram" name="instagram" type="text" />

        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="18" />

        <button id="submitBtn" type="submit">Submit Application</button>
      </form>

      <div id="successMessage" class="message">
        Application received.<br>
        Your profile is now under review.<br>
        You will be contacted if approved.
      </div>

      <div id="errorMessage" class="error">
        Error submitting application.
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/create-lead";

    const form = document.getElementById("applyForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      errorMessage.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        instagram: document.getElementById("instagram").value.trim(),
        age: document.getElementById("age").value.trim()
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        form.style.display = "none";
        successMessage.style.display = "block";
        console.log("Lead created:", data);
      } catch (err) {
        console.error(err);
        errorMessage.textContent = err.message || "Error submitting application.";
        errorMessage.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Application";
      }
    });
  </script>
</body>
</html>
