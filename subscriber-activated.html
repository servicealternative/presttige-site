<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
  <meta name="google" content="notranslate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Subscriber</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-black: #1A1A1A;
      --pp-paper: #FFFFFF;
      --pp-background: #FBF9F4;
      --pp-gold: #8A7544;
      --pp-hairline: #DDD6C8;
      --pp-muted: #4F4940;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--pp-background);
      color: var(--pp-black);
      font-family: "Source Serif 4", Georgia, serif;
    }

    .card {
      width: min(100%, 760px);
      padding: 42px 34px;
      border: 1px solid var(--pp-hairline);
      background: var(--pp-paper);
    }

    .label {
      margin: 0 0 16px;
      color: var(--pp-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .title {
      margin: 0 0 22px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(44px, 7vw, 64px);
      font-weight: 600;
      line-height: 0.95;
    }

    .copy-group {
      display: grid;
      gap: 18px;
    }

    .copy {
      margin: 0;
      color: var(--pp-muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border: 1px solid var(--pp-gold);
      background: var(--pp-gold);
      color: #FFFFFF;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      cursor: pointer;
    }

    .button[disabled] {
      cursor: default;
      opacity: 0.7;
    }

    .error {
      color: #8B1E1E;
    }
  </style>
  <link rel="stylesheet" href="/assets/css/brand-fonts.css">
</head>
<body translate="no">
  <section id="app" class="card">
    <p class="label">ACCESS POINT</p>
    <h1 class="title">Subscriber</h1>
    <div class="copy-group">
      <p class="copy">Loading your membership…</p>
    </div>
  </section>

  <script>
    (function () {
      "use strict";

      const app = document.getElementById("app");
      const route = readRoute();
      const state = {
        busy: false,
      };

      if (!route.token) {
        renderError("Missing access token.");
        return;
      }

      render();

      function render() {
        const confirmed = route.status === "confirmed";
        app.innerHTML = `
          <p class="label">ACCESS POINT</p>
          <h1 class="title">Subscriber</h1>
          <div class="copy-group">
            <p class="copy">You have been approved.</p>
            <p class="copy">No payment required at this stage.</p>
            <p class="copy">Your place is recognised. Your membership — Club, Premier, or Patron — is yours to choose, when you choose.</p>
          </div>
          <div class="actions">
            ${
              confirmed
                ? `<button type="button" class="button" disabled>Subscription confirmed</button>`
                : route.mode !== "confirmed"
                ? `<button type="button" class="button" data-confirm-subscriber="true" ${state.busy ? "disabled" : ""}>${state.busy ? "Confirming…" : "Confirm subscription"}</button>`
                : `<button type="button" class="button" disabled>Subscription confirmed</button>`
            }
          </div>
        `;

        const button = app.querySelector("[data-confirm-subscriber]");
        if (button) {
          button.addEventListener("click", confirmSubscription);
        }
      }

      async function confirmSubscription() {
        if (state.busy) {
          return;
        }

        state.busy = true;
        render();

        try {
          const response = await fetch(`https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/activate-subscriber`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token: route.token,
            }),
          });
          const data = await response.json();

          if (!response.ok || !data.activated) {
            renderError(data.error || "Unable to confirm your subscription right now.");
            return;
          }

          window.location.assign(`/subscriber/${encodeURIComponent(route.token)}?status=confirmed`);
        } catch (error) {
          renderError("Unable to confirm your subscription right now.");
        } finally {
          state.busy = false;
        }
      }

      function renderError(message) {
        app.innerHTML = `
          <p class="label">ACCESS POINT</p>
          <h1 class="title">Subscriber</h1>
          <div class="copy-group">
            <p class="copy error">${escapeHtml(message)}</p>
          </div>
        `;
      }

      function readRoute() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const query = new URLSearchParams(window.location.search);
        return {
          token:
            segments[0] === "subscriber" || segments[0] === "subscriber-activated"
              ? segments[1] || ""
              : "",
          mode: query.get("mode") || "",
          status: query.get("status") || "",
        };
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
