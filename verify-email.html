<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Verifying Email</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f4f1eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      width: min(100%, 560px);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 42px 30px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    p {
      color: rgba(244,241,235,0.74);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .status {
      color: #d1ae72;
      font-weight: 600;
    }

    .error {
      color: #ffb4b4;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #cfa96a 0%, #e1c28d 100%);
      color: #0d0d0d;
      font-weight: 600;
      margin-top: 12px;
      text-decoration: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Email Verification</h1>
    <p id="message" class="status">Verifying your email…</p>
    <a id="fallbackBtn" class="btn hidden" href="/">Return to Presttige</a>
  </div>

  <script>
    async function verifyEmail() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const leadId = params.get('lead_id');
      const type = params.get('type') || 'access';

      const messageEl = document.getElementById('message');
      const fallbackBtn = document.getElementById('fallbackBtn');

      if (!token || !leadId) {
        messageEl.textContent = 'Invalid verification link.';
        messageEl.classList.add('error');
        fallbackBtn.classList.remove('hidden');
        return;
      }

      const API_URL = 'https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/prod/verify-email';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            token: token,
            lead_id: leadId,
            type: type
          })
        });

        const rawText = await response.text();
        let parsed = null;

        try {
          parsed = rawText ? JSON.parse(rawText) : null;
        } catch (e) {
          parsed = rawText;
        }

        if (!response.ok) {
          const backendMessage =
            (parsed && typeof parsed === 'object' && (parsed.message || parsed.error)) ||
            `Request failed (${response.status})`;
          throw new Error(backendMessage);
        }

        messageEl.textContent = 'Email verified. Redirecting…';

        const redirectUrl =
          parsed && parsed.redirect_url
            ? parsed.redirect_url
            : `https://presttige.net/access-form.html?lead_id=${encodeURIComponent(leadId)}`;

        setTimeout(() => {
          window.location.replace(redirectUrl);
        }, 900);

      } catch (error) {
        const message = error && error.message ? error.message : 'Verification failed.';
        messageEl.textContent = message;
        messageEl.classList.add('error');
        fallbackBtn.classList.remove('hidden');
        console.error('Presttige verify email error:', error);
      }
    }

    verifyEmail();
  </script>
</body>
</html>
