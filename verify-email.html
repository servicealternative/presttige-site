<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Verifying Email</title>
  <link rel="shortcut icon" href="/favicon.ico?v=20260421b" type="image/x-icon" />
  <link rel="icon" href="/favicon.ico?v=20260421b" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260421b" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260421b" />
  <link rel="apple-touch-icon" href="/assets/images/presttige-favicon.png?v=20260421b" />

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f4f1eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      width: min(100%, 560px);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 42px 30px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    p {
      color: rgba(244,241,235,0.74);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .status {
      color: #d1ae72;
      font-weight: 600;
    }

    .error {
      color: #ffb4b4;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #cfa96a 0%, #e1c28d 100%);
      color: #0d0d0d;
      font-weight: 600;
      margin-top: 12px;
      text-decoration: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Email Verification</h1>
    <p id="message" class="status">Verifying your email…</p>
    <a id="fallbackBtn" class="btn hidden" href="/">Return to Presttige</a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      const messageEl = document.getElementById('message');
      const fallbackBtn = document.getElementById('fallbackBtn');

      if (!token) {
        messageEl.textContent = 'Invalid verification link.';
        messageEl.classList.add('error');
        fallbackBtn.classList.remove('hidden');
        return;
      }

      const apiUrl =
        'https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/prod/verify-email?token=' +
        encodeURIComponent(token);

      // Importante:
      // não usamos fetch aqui.
      // Redirecionamos o browser diretamente para o endpoint,
      // e o Lambda devolve o redirect final para access-form.html?lead_id=...
      window.location.replace(apiUrl);
    })();
  </script>
</body>
</html>
