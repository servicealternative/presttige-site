<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Verifying Email</title>
  <link rel="shortcut icon" href="/favicon.ico?v=20260421d" type="image/x-icon" />
  <link rel="icon" href="/favicon.ico?v=20260421d" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260421d" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260421d" />
  <link rel="apple-touch-icon" href="/assets/images/presttige-favicon.png?v=20260421d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Source+Serif+Pro:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="/assets/js/consent-banner.js" defer></script>

  <style>
    :root {
      --primary: #0A0A0A;
      --background: #F5F2ED;
      --paper: #FBF9F4;
      --accent: #8C7040;
      --muted: #4A4A4A;
      --hairline: #D9D2C5;
      --danger: #8F4D47;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--background);
      color: var(--primary);
      font-family: "Source Serif Pro", Georgia, serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "liga" 1, "kern" 1;
    }

    .verify-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 24px;
      background: var(--background);
    }

    .verify-content {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    .verify-eyebrow {
      font-size: 7.5pt;
      font-weight: 500;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .verify-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 36pt;
      line-height: 1.15;
      color: var(--primary);
      margin-bottom: 32px;
      letter-spacing: -0.005em;
    }

    .verify-divider {
      width: 38px;
      height: 0.5px;
      background: var(--accent);
      margin: 0 auto 28px auto;
      border: none;
    }

    .verify-body {
      font-family: "Source Serif Pro", Georgia, serif;
      font-style: italic;
      font-size: 10.5pt;
      line-height: 1.6;
      color: var(--muted);
      max-width: 380px;
      margin: 0 auto 44px auto;
    }

    .verify-body.error {
      color: var(--danger);
    }

    .verify-link {
      display: inline-block;
      font-size: 8.5pt;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 0.5px solid var(--hairline);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .verify-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="verify-page">
    <div class="verify-content">
      <div class="verify-eyebrow">Verification</div>
      <h1 class="verify-title">Verifying your email.</h1>
      <hr class="verify-divider" />
      <p id="message" class="verify-body">One moment, please.</p>
      <a id="fallbackLink" class="verify-link hidden" href="/">Return to Presttige</a>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      const messageEl = document.getElementById('message');
      const fallbackLink = document.getElementById('fallbackLink');

      if (!token) {
        messageEl.textContent = 'Invalid verification link.';
        messageEl.classList.add('error');
        fallbackLink.classList.remove('hidden');
        return;
      }

      const apiUrl =
        'https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com/prod/verify-email?token=' +
        encodeURIComponent(token);

      setTimeout(function () {
        window.location.replace(apiUrl);
      }, 60);
    })();
  </script>
</body>
</html>
