<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Review</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-primary: #0A0A0A;
      --pp-paper: #FBF9F4;
      --pp-background: #F5F2ED;
      --pp-accent: #8C7040;
      --pp-hairline: #D9D2C5;
      --pp-muted: #4A4A4A;
      --pp-error: #9F1D1D;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--pp-background);
      color: var(--pp-primary);
      font-family: "Source Serif Pro", Georgia, serif;
    }

    .review-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .review-eyebrow {
      margin: 0 0 14px;
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .review-title {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(42px, 7vw, 66px);
      line-height: 0.95;
    }

    .review-state,
    .review-error {
      padding: 24px;
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
    }

    .review-error {
      color: var(--pp-error);
    }

    .review-grid {
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      margin-top: 32px;
    }

    .review-card {
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
      padding: 28px;
    }

    .review-card h2,
    .review-card h3 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
    }

    .review-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 24px;
      margin-bottom: 28px;
    }

    .review-detail {
      margin: 0;
      display: grid;
      gap: 6px;
    }

    .review-detail dt {
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .review-detail dd {
      margin: 0;
      color: var(--pp-primary);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .review-copy-block {
      margin-bottom: 24px;
    }

    .review-copy-label {
      margin: 0 0 10px;
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .review-copy {
      margin: 0;
      color: var(--pp-muted);
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .review-photos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .review-photo {
      display: block;
      border: 1px solid var(--pp-hairline);
      background: #ece7dd;
      overflow: hidden;
    }

    .review-photo img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .review-actions {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .review-actions button,
    .review-confirm {
      width: 100%;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--pp-accent);
      background: transparent;
      color: var(--pp-accent);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .review-actions button.is-selected {
      background: var(--pp-primary);
      border-color: var(--pp-primary);
      color: var(--pp-paper);
    }

    .review-note {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid var(--pp-hairline);
      background: #fffdf9;
      color: var(--pp-primary);
      font: inherit;
      resize: vertical;
    }

    .review-subtitle {
      margin: 0 0 16px;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .review-status {
      margin: 18px 0 0;
      color: var(--pp-accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 920px) {
      .review-grid {
        grid-template-columns: 1fr;
      }

      .review-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="review-shell">
    <p class="review-eyebrow">Presttige Committee Review</p>
    <h1 class="review-title">Application Review</h1>
    <section id="app" class="review-state">Loading application…</section>
  </main>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com";
      const app = document.getElementById("app");
      const token = window.location.pathname.split("/").filter(Boolean).pop();
      const presetAction = new URLSearchParams(window.location.search).get("action");
      let selectedAction = presetAction || "";

      if (!token || token === "review" || token === "review.html") {
        renderError("Missing review token.");
        return;
      }

      load();

      async function load() {
        try {
          const response = await fetch(`${API_BASE}/review-fetch?token=${encodeURIComponent(token)}`);
          const data = await response.json();

          if (response.status === 410) {
            renderUsed(data);
            return;
          }

          if (!response.ok) {
            renderError(data.error || "Unable to load this application.");
            return;
          }

          renderReview(data);
        } catch (error) {
          renderError("Unable to load the application right now. If the issue persists, contact support.");
        }
      }

      function renderReview(data) {
        const profile = data.profile || {};
        const photos = data.photos || [];
        const phone = [profile.phone_country, profile.phone].filter(Boolean).join(" ");

        app.className = "review-grid";
        app.innerHTML = `
          <section class="review-card">
            <h2>${escapeHtml(profile.name || "Applicant")}</h2>
            <dl class="review-details">
              ${detailRow("Name", profile.name)}
              ${detailRow("Age", profile.age)}
              ${detailRow("Email", profile.email)}
              ${detailRow("Phone", phone)}
              ${detailRow("Country", profile.country)}
              ${detailRow("City", profile.city)}
              ${detailRow("Occupation", profile.occupation)}
              ${detailRow("Company", profile.company)}
              ${detailRow("Instagram", profile.instagram)}
              ${detailRow("LinkedIn", profile.linkedin)}
              ${detailRow("TikTok", profile.tiktok)}
              ${detailRow("Website", profile.website)}
            </dl>
            <div class="review-copy-block">
              <p class="review-copy-label">Short introduction</p>
              <p class="review-copy">${escapeHtml(profile.short_introduction || "No introduction provided.")}</p>
            </div>
            <div class="review-copy-block">
              <p class="review-copy-label">Why Presttige</p>
              <p class="review-copy">${escapeHtml(profile.why_presttige || "No Presttige rationale provided.")}</p>
            </div>
            <div class="review-photos">
              ${photos.map((photo) => `
                <a class="review-photo" href="${photo.thumb_1200}" target="_blank" rel="noopener">
                  <img src="${photo.thumb_400}" alt="Applicant photo">
                </a>
              `).join("")}
            </div>
          </section>
          <aside class="review-card">
            <h3>Decision</h3>
            <p class="review-subtitle">Choose one outcome, add an optional note, and record the decision once.</p>
            <div class="review-actions">
              ${actionButton("approve", "Approve")}
              ${actionButton("reject", "Reject")}
              ${actionButton("standby", "Standby")}
            </div>
            <textarea id="review-note" class="review-note" placeholder="Optional note for the audit trail."></textarea>
            <button id="review-confirm" class="review-confirm">Confirm decision</button>
            <p id="review-status" class="review-status"></p>
          </aside>
        `;

        app.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedAction = button.dataset.action;
            renderReview(data);
          });
        });

        app.querySelector("#review-confirm").addEventListener("click", submitDecision);
      }

      async function submitDecision() {
        if (!selectedAction) {
          setStatus("Choose a decision first.");
          return;
        }

        const note = document.getElementById("review-note").value;
        setStatus("Recording decision…");

        try {
          const response = await fetch(`${API_BASE}/review-action`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, action: selectedAction, note }),
          });
          const data = await response.json();

          if (response.status === 410) {
            renderUsed(data);
            return;
          }

          if (!response.ok) {
            setStatus(data.error || "Unable to record the decision.");
            return;
          }

          app.className = "review-state";
          app.innerHTML = `
            <div class="review-card">
              <h2>Decision recorded</h2>
              <p class="review-copy">${escapeHtml(data.decision || selectedAction)} recorded successfully.</p>
              <p class="review-copy">This review token is now closed.</p>
            </div>
          `;
        } catch (error) {
          setStatus("Unable to record the decision right now. If needed, contact support.");
        }
      }

      function renderUsed(data) {
        app.className = "review-state";
        app.innerHTML = `
          <div class="review-card">
            <h2>Already reviewed</h2>
            <p class="review-copy">This application has already been reviewed${data.decision ? `: ${escapeHtml(data.decision)}` : "."}</p>
            ${data.used_at ? `<p class="review-copy">Recorded at ${escapeHtml(data.used_at)}.</p>` : ""}
          </div>
        `;
      }

      function renderError(message) {
        app.className = "review-error";
        app.textContent = message;
      }

      function setStatus(message) {
        const status = document.getElementById("review-status");
        if (status) status.textContent = message;
      }

      function detailRow(label, value) {
        if (!value) return "";
        return `<div class="review-detail"><dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value)}</dd></div>`;
      }

      function actionButton(action, label) {
        const selected = action === selectedAction ? " is-selected" : "";
        return `<button type="button" class="${selected.trim()}" data-action="${action}">${label}</button>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    })();
  </script>
</body>
</html>
