<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Membership</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-primary: #0A0A0A;
      --pp-background: #F5F2ED;
      --pp-paper: #FBF9F4;
      --pp-accent: #8C7040;
      --pp-muted: #6B6B6B;
      --pp-hairline: #D9D2C5;
      --pp-error: #9F1D1D;
      --pp-accent-tint: rgba(140, 112, 64, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--pp-background);
      color: var(--pp-primary);
      font-family: "Source Serif Pro", Georgia, serif;
    }

    .shell {
      width: min(100%, 1360px);
      margin: 0 auto;
      padding: 26px 24px 54px;
    }

    .state-box,
    .error-box {
      padding: 24px;
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
      color: var(--pp-primary);
      font-size: 16px;
      line-height: 1.7;
    }

    .error-box {
      color: var(--pp-error);
    }

    .landing {
      display: grid;
      gap: 22px;
      align-items: start;
    }

    .landing-hero {
      min-width: 0;
    }

    .landing-secondary-row {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
    }

    .landing-secondary-slot {
      display: flex;
      min-width: 0;
    }

    .landing-secondary-slot > .card {
      flex: 1 1 auto;
    }

    .card,
    .feature-card,
    .switch-card {
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 22px 24px 22px;
    }

    .card--patron {
      padding: 116px 40px 28px;
      border-color: var(--pp-accent);
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at top right, rgba(140, 112, 64, 0.18), rgba(140, 112, 64, 0) 34%),
        linear-gradient(180deg, rgba(140, 112, 64, 0.08) 0%, rgba(251, 249, 244, 0.97) 34%, rgba(251, 249, 244, 1) 100%);
    }

    .card--patron > :not(.stamp--hero) {
      position: relative;
      z-index: 1;
    }

    .card--subscriber {
      padding: 20px 22px 22px;
      background: var(--pp-paper);
      border-color: var(--pp-hairline);
    }

    .stamp {
      position: absolute;
      top: 18px;
      right: 20px;
      transform: rotate(12deg);
      border: 1px solid var(--pp-accent);
      color: var(--pp-accent);
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: rgba(245, 242, 237, 0.92);
    }

    .stamp--hero {
      top: 24px;
      right: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 12px 22px 10px;
      border: 2px solid var(--pp-accent);
      box-shadow: inset 0 0 0 1px rgba(140, 112, 64, 0.18);
      background: linear-gradient(180deg, rgba(140, 112, 64, 0.07) 0%, rgba(140, 112, 64, 0.02) 100%);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(18px, 1.7vw, 24px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
      transform: rotate(8deg);
      transform-origin: center;
      max-width: calc(100% - 48px);
      z-index: 0;
      pointer-events: none;
    }

    .stamp--hero::after {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(140, 112, 64, 0.66);
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--pp-accent);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow--subscriber {
      color: var(--pp-muted);
    }

    .title {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.94;
    }

    .title--compact {
      font-size: clamp(28px, 3vw, 42px);
    }

    .price {
      margin: 0 0 12px;
      color: var(--pp-primary);
      font-size: 18px;
      line-height: 1.5;
    }

    .renewal {
      margin: -4px 0 12px;
      color: var(--pp-muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .lead {
      margin: 0 0 16px;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.62;
    }

    .lead--patron {
      max-width: none;
    }

    .section-group {
      display: grid;
      gap: 10px;
    }

    .section-group--patron {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 18px;
    }

    .section-block {
      padding-top: 10px;
      border-top: 1px solid rgba(140, 112, 64, 0.14);
    }

    .section-title {
      margin: 0 0 8px;
      color: var(--pp-primary);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .benefits {
      margin: 0;
      padding-left: 18px;
      color: var(--pp-muted);
      font-size: 14px;
      line-height: 1.58;
    }

    .benefits li + li {
      margin-top: 4px;
    }

    .actions {
      margin-top: auto;
      padding-top: 16px;
    }

    .button,
    .switch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 22px;
      border: 1px solid var(--pp-primary);
      background: var(--pp-primary);
      color: var(--pp-paper);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .button--secondary,
    .switch-button {
      background: transparent;
      color: var(--pp-primary);
      border-color: var(--pp-hairline);
    }

    .button--subscriber {
      background: transparent;
      color: var(--pp-muted);
      border-color: var(--pp-muted);
    }

    .button:hover:not(:disabled),
    .switch-button:hover:not(:disabled) {
      opacity: 0.92;
    }

    .button:disabled,
    .switch-button:disabled {
      cursor: progress;
      opacity: 0.62;
    }

    .button--full {
      width: 100%;
    }

    .feature-layout {
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.8fr);
      align-items: stretch;
    }

    .feature-card {
      min-height: min(60vh, 760px);
      padding: 42px 38px;
    }

    .feature-card--patron {
      border-color: var(--pp-accent);
      background:
        radial-gradient(circle at top right, rgba(140, 112, 64, 0.18), rgba(140, 112, 64, 0) 28%),
        linear-gradient(180deg, rgba(140, 112, 64, 0.08) 0%, rgba(251, 249, 244, 1) 100%);
    }

    .feature-summary {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 42px 34px;
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
    }

    .summary-label {
      margin: 0 0 10px;
      color: var(--pp-muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .summary-title {
      margin: 0 0 14px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(34px, 5vw, 50px);
      line-height: 0.96;
    }

    .summary-price {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.5;
    }

    .summary-renewal {
      margin: 0 0 18px;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .callout {
      margin: 0 0 22px;
      padding: 18px 20px;
      border: 1px solid var(--pp-accent);
      background: var(--pp-accent-tint);
      color: var(--pp-primary);
      font-size: 15px;
      line-height: 1.72;
    }

    .switches {
      margin-top: 28px;
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .switch-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 28px 24px 24px;
    }

    .switch-title {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 32px;
      line-height: 0.98;
    }

    .switch-copy {
      margin: 0 0 20px;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.72;
    }

    .switch-actions {
      margin-top: auto;
      padding-top: 12px;
    }

    @media (max-width: 1200px) {
      .card--patron {
        padding-top: 110px;
        padding-left: 34px;
        padding-right: 34px;
      }

      .stamp--hero {
        top: 24px;
        right: 24px;
      }
    }

    @media (max-width: 1100px) {
      .feature-layout {
        grid-template-columns: 1fr;
      }

      .feature-card {
        min-height: auto;
      }
    }

    @media (max-width: 1023px) {
      .card--patron {
        padding-top: 100px;
      }

      .landing-secondary-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .landing-secondary-slot--subscriber {
        grid-column: 1 / -1;
      }

      .stamp--hero {
        top: 24px;
        right: 24px;
        min-height: 52px;
        padding: 10px 18px 8px;
        font-size: 18px;
        transform: rotate(6deg);
      }
    }

    @media (max-width: 980px) {

      .section-group--patron {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .switches {
        grid-template-columns: 1fr;
      }

      .feature-card,
      .feature-summary {
        padding-left: 24px;
        padding-right: 24px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 24px 16px 44px;
      }

      .card,
      .feature-card,
      .feature-summary,
      .switch-card {
        padding: 24px 20px 20px;
      }

      .card--patron {
        padding: 96px 20px 20px;
      }

      .stamp:not(.stamp--hero) {
        position: static;
        transform: none;
        display: inline-flex;
        margin-bottom: 16px;
      }

      .stamp--hero {
        top: 24px;
        right: 24px;
        min-height: 42px;
        padding: 8px 12px 7px;
        font-size: 13px;
        letter-spacing: 0.12em;
        transform: rotate(3deg);
        max-width: calc(100% - 48px);
      }

      .landing-secondary-row {
        grid-template-columns: 1fr;
      }

      .landing-secondary-slot--subscriber {
        grid-column: auto;
      }

      .button,
      .switch-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="app" class="state-box">Loading your membership options…</section>
  </main>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com";
      const app = document.getElementById("app");
      const TIER_ORDER = ["patron", "premier", "club"];
      const UPGRADE_COPY = "Upgrade to Patron at any time before 31 December 2026 by paying only the difference — and become Patron for life.";
      const TIER_CONTENT = {
        patron: {
          slug: "patron",
          eyebrow: "HIGHEST TIER · BY EXCEPTION",
          title: "Patron",
          price: "$999 · one-time · lifetime",
          renewal: "",
          stamp: "PATRON · FOUNDING · LIFETIME",
          lead: "The inner circle. A single payment of $999 — once, forever. The full Presttige network, direct access to founders, and the only tier with our curated add-on services.",
          ctaLanding: "CONTINUE TO PATRON",
          ctaCheckout: "CONTINUE TO CHECKOUT",
          landingClass: "card card--patron",
          sections: [
            {
              title: "STATUS & ACCESS",
              items: [
                "Lifetime access — single payment of $999, never another bill, never a renewal",
                "Founding member — permanent FOUNDING badge",
                "Full Presttige network across all members and tiers"
              ]
            },
            {
              title: "DIRECT ACCESS",
              items: [
                "Direct line to founders for add-ons, services, and personal requests (Patron-exclusive)",
                "Right to propose new members — endorsement carries greatest weight in committee review"
              ]
            },
            {
              title: "ADD-ONS & SERVICES",
              items: [
                "Formula 1 Grand Prix paddock & hospitality",
                "Major sports tickets — Champions League, Wimbledon, NBA Finals, Super Bowl, World Cup",
                "VIP nightlife — Dubai, London, NY, Ibiza, Mykonos",
                "Private aviation concierge",
                "Yacht charter — Mediterranean, Caribbean",
                "Fashion week front row — Paris, Milan, NY, London",
                "Art Basel & auction house previews",
                "Michelin-starred reservations",
                "Hotel suite upgrades — Bulgari, Aman, Rosewood",
                "Wellness retreats — Lanserhof, SHA, Kamalaya"
              ]
            },
            {
              title: "RECOGNITION",
              items: [
                "FOUNDING stamp on profile",
                "Lifetime tier display",
                "Voice consulted on major Presttige direction decisions",
                "Presttige Patron Card (Apple Wallet + QR) — coming soon"
              ]
            }
          ]
        },
        premier: {
          slug: "premier",
          eyebrow: "MEMBERSHIP TIER",
          title: "Premier",
          price: "$222 · founding rate · first year",
          renewal: "Renews at $33/month or $222/year after the first twelve months.",
          stamp: "",
          lead: "Full access to the Presttige network, with the right to suggest new members. A founding rate locked for your first year.",
          ctaLanding: "CONTINUE TO PREMIER",
          ctaCheckout: "CONTINUE TO CHECKOUT",
          landingClass: "card",
          sections: [
            {
              title: "STATUS & ACCESS",
              items: [
                "1-year membership at the founding rate of $222",
                "Full access to the Presttige network — all members across all geographies"
              ]
            },
            {
              title: "MEMBER RIGHTS",
              items: [
                "Right to suggest new members — proposals reviewed by the committee (Patron endorsements carry greater weight)"
              ]
            },
            {
              title: "STAY INFORMED",
              items: [
                "Updates on Patron seat availability",
                "New add-on services as they launch",
                "Major Presttige announcements",
                "Reminders before the upgrade window closes"
              ]
            },
            {
              title: "RECOGNITION",
              items: [
                "Premier badge on profile",
                "Tier visible on directory"
              ]
            },
            {
              title: "UPGRADE OPTION (TIME-LIMITED)",
              items: [
                "Until 31 December 2026 (or while Patron seats remain), upgrade to Patron by paying $777 difference and become Patron for life"
              ]
            }
          ]
        },
        club: {
          slug: "club",
          eyebrow: "MEMBERSHIP TIER",
          title: "Club",
          price: "$99 · founding rate · first year",
          renewal: "Renews at $9.99/month or $99/year after the first twelve months.",
          stamp: "",
          lead: "The entry to the Presttige network. Founding-rate access for your first year, and the option to upgrade to Patron at any time before 31 December 2026.",
          ctaLanding: "CONTINUE TO CLUB",
          ctaCheckout: "CONTINUE TO CHECKOUT",
          landingClass: "card",
          sections: [
            {
              title: "STATUS & ACCESS",
              items: [
                "1-year membership at the founding rate of $99",
                "Access to the Presttige network — directory and basic communication"
              ]
            },
            {
              title: "STAY INFORMED",
              items: [
                "Updates on Patron seat availability",
                "New add-on services as they launch",
                "Major Presttige announcements",
                "Reminders before the upgrade window closes"
              ]
            },
            {
              title: "RECOGNITION",
              items: [
                "Club badge on profile",
                "Tier visible on directory"
              ]
            },
            {
              title: "UPGRADE OPTION (TIME-LIMITED)",
              items: [
                "Until 31 December 2026 (or while Patron seats remain), upgrade to Patron by paying $900 difference and become Patron for life"
              ]
            }
          ]
        },
        subscriber: {
          slug: "subscriber",
          eyebrow: "ENTRY PATH",
          title: "Subscriber",
          price: "No payment required",
          renewal: "",
          stamp: "",
          lead: "For approved candidates who choose to stay close to Presttige without committing to a tier today. Receive Presttige communications, follow Patron seat availability, and upgrade to Club, Premier, or Patron whenever you're ready.",
          ctaLanding: "JOIN AS SUBSCRIBER",
          ctaCheckout: "",
          landingClass: "card card--subscriber",
          sections: [
            {
              title: "STATUS",
              items: [
                "Approved by the committee, no payment",
                "On the Presttige communications list",
                "Not displayed in the member directory"
              ]
            },
            {
              title: "STAY INFORMED",
              items: [
                "Updates on Patron seat availability",
                "New add-on services as they launch",
                "Major Presttige announcements",
                "Reminders before the upgrade window closes (31 Dec 2026)"
              ]
            },
            {
              title: "UPGRADE PATH",
              items: [
                "Upgrade to Club: $99 / year (founding rate)",
                "Upgrade to Premier: $222 / year (founding rate)",
                "Upgrade to Patron: $999 lifetime (until 31 Dec 2026 or while seats remain)"
              ]
            }
          ]
        }
      };

      let payload = null;
      let route = readRoute();
      let activeAction = "";

      if (!route.token) {
        renderError("Missing tier selection token.");
      } else {
        load();
      }

      window.addEventListener("popstate", () => {
        route = readRoute();
        if (payload) {
          render();
        }
      });

      async function load() {
        try {
          const response = await fetch(`${API_BASE}/tier-select-fetch?token=${encodeURIComponent(route.token)}`);
          const data = await response.json();

          if (response.status === 410) {
            renderError("This invitation has expired or was already used");
            return;
          }

          if (!response.ok) {
            renderError(data.error || "Unable to load your membership options.");
            return;
          }

          payload = data;
          render();
        } catch (error) {
          renderError("Unable to load your membership options right now.");
        }
      }

      function render() {
        const currentTier = route.view === "landing" ? null : route.view;
        app.className = "";
        app.innerHTML = currentTier ? renderDetailPage(currentTier) : renderLandingPage();
        bindActions();
      }

      function renderLandingPage() {
        return `
          <section class="landing">
            <div class="landing-hero">
              ${renderLandingCard("patron", {
                dominant: true,
                stampText: "BECOME A FOUNDER",
                stampClass: "stamp stamp--hero",
                stampAriaLabel: "Become a founder — Patron tier"
              })}
            </div>
            <div class="landing-secondary-row">
              <div class="landing-secondary-slot">
                ${renderLandingCard("premier", { compact: true })}
              </div>
              <div class="landing-secondary-slot">
                ${renderLandingCard("club", { compact: true })}
              </div>
              <div class="landing-secondary-slot landing-secondary-slot--subscriber">
                ${renderLandingCard("subscriber", { subscriber: true })}
              </div>
            </div>
          </section>
        `;
      }

      function renderLandingCard(tier, options) {
        const content = TIER_CONTENT[tier];
        const headingTag = options.dominant ? "h1" : "h2";
        const titleClass = options.dominant ? "title" : "title title--compact";
        const eyebrowClass = tier === "subscriber" ? "eyebrow eyebrow--subscriber" : "eyebrow";
        const leadClass = options.dominant ? "lead lead--patron" : "lead";
        const sectionGroupClass = options.dominant ? "section-group section-group--patron" : "section-group";
        const buttonClass = tier === "subscriber"
          ? "button button--subscriber"
          : options.dominant
            ? "button"
            : "button button--secondary";

        return `
          <article class="${content.landingClass}" data-tier-card="${tier}">
            ${
              options.stampText
                ? `<div class="${escapeHtml(options.stampClass || "stamp")}" aria-label="${escapeHtml(options.stampAriaLabel || "")}">${escapeHtml(options.stampText)}</div>`
                : content.stamp
                  ? `<div class="stamp">${escapeHtml(content.stamp)}</div>`
                  : ""
            }
            <p class="${eyebrowClass}">${escapeHtml(content.eyebrow)}</p>
            <${headingTag} class="${titleClass}">${escapeHtml(content.title)}</${headingTag}>
            <p class="price">${escapeHtml(content.price)}</p>
            ${content.renewal ? `<p class="renewal">${escapeHtml(content.renewal)}</p>` : ""}
            <p class="${leadClass}">${escapeHtml(content.lead)}</p>
            <div class="${sectionGroupClass}">
              ${content.sections.map(renderSectionBlock).join("")}
            </div>
            <div class="actions">
              ${
                tier === "subscriber"
                  ? `<button type="button" class="${buttonClass}" data-activate-subscriber="true" ${activeAction === "subscriber" ? "disabled" : ""}>${activeAction === "subscriber" ? "ACTIVATING…" : content.ctaLanding}</button>`
                  : `<button type="button" class="${buttonClass}" data-go-tier="${tier}" ${activeAction === tier ? "disabled" : ""}>${activeAction === tier ? "LOADING…" : content.ctaLanding}</button>`
              }
            </div>
          </article>
        `;
      }

      function renderDetailPage(tier) {
        const content = TIER_CONTENT[tier];
        const otherTiers = TIER_ORDER.filter((slug) => slug !== tier);
        return `
          <section class="feature-layout">
            <article class="feature-card ${tier === "patron" ? "feature-card--patron" : ""}" data-tier-card="${tier}">
              ${content.stamp ? `<div class="stamp">${escapeHtml(content.stamp)}</div>` : ""}
              <p class="eyebrow">${escapeHtml(content.eyebrow)}</p>
              <h1 class="title">${escapeHtml(content.title)}</h1>
              <p class="price">${escapeHtml(content.price)}</p>
              ${content.renewal ? `<p class="renewal">${escapeHtml(content.renewal)}</p>` : ""}
              <p class="lead">${escapeHtml(content.lead)}</p>
              <div class="section-group">
                ${content.sections.map(renderSectionBlock).join("")}
              </div>
            </article>
            <aside class="feature-summary">
              <p class="summary-label">Selected Tier</p>
              <h2 class="summary-title">${escapeHtml(content.title)}</h2>
              <p class="summary-price">${escapeHtml(content.price)}</p>
              ${content.renewal ? `<p class="summary-renewal">${escapeHtml(content.renewal)}</p>` : ""}
              ${tier === "club" || tier === "premier" ? `<div class="callout">${escapeHtml(UPGRADE_COPY)}</div>` : ""}
              <div class="actions">
                <button type="button" class="button button--full" data-checkout-tier="${tier}" ${activeAction === tier ? "disabled" : ""}>${activeAction === tier ? "REDIRECTING…" : content.ctaCheckout}</button>
              </div>
            </aside>
          </section>
          <section class="switches">
            ${otherTiers.map(renderSwitchCard).join("")}
          </section>
        `;
      }

      function renderSwitchCard(tier) {
        const content = TIER_CONTENT[tier];
        return `
          <article class="switch-card" data-tier-switch="${tier}">
            <p class="eyebrow">${escapeHtml(content.eyebrow)}</p>
            <h3 class="switch-title">${escapeHtml(content.title)}</h3>
            <p class="switch-copy">${escapeHtml(content.price)}${content.renewal ? ` ${escapeHtml(content.renewal)}` : ""}</p>
            <div class="switch-actions">
              <button type="button" class="switch-button" data-go-tier="${tier}" ${activeAction === tier ? "disabled" : ""}>${activeAction === tier ? "LOADING…" : `SWITCH TO ${content.title.toUpperCase()}`}</button>
            </div>
          </article>
        `;
      }

      function renderSectionBlock(section) {
        return `
          <section class="section-block">
            <h2 class="section-title">${escapeHtml(section.title)}</h2>
            <ul class="benefits">
              ${section.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </section>
        `;
      }

      function bindActions() {
        app.querySelectorAll("[data-go-tier]").forEach((button) => {
          button.addEventListener("click", () => navigateToTier(button.getAttribute("data-go-tier")));
        });

        app.querySelectorAll("[data-checkout-tier]").forEach((button) => {
          button.addEventListener("click", () => beginCheckout(button.getAttribute("data-checkout-tier")));
        });

        app.querySelectorAll("[data-activate-subscriber]").forEach((button) => {
          button.addEventListener("click", () => activateSubscriber());
        });
      }

      function navigateToTier(tier) {
        activeAction = tier;
        render();
        const nextPath = buildTierPath(tier);
        window.history.pushState({}, "", nextPath);
        route = readRoute();
        activeAction = "";
        render();
      }

      async function beginCheckout(tier) {
        activeAction = tier;
        render();

        try {
          const response = await fetch(`${API_BASE}/create-checkout-session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: route.token,
              tier,
            }),
          });
          const data = await response.json();

          if (!response.ok) {
            renderError(data.error || "Unable to continue right now.");
            return;
          }

          if (!data.redirect_url) {
            renderError("Missing redirect URL from checkout session.");
            return;
          }

          window.location.assign(data.redirect_url);
        } catch (error) {
          renderError("Unable to continue right now.");
        } finally {
          activeAction = "";
        }
      }

      async function activateSubscriber() {
        activeAction = "subscriber";
        render();

        try {
          const response = await fetch(`${API_BASE}/activate-subscriber`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: route.token,
            }),
          });
          const data = await response.json();

          if (!response.ok) {
            renderError(data.error || "Unable to activate Subscriber right now.");
            return;
          }

          if (!data.redirect_url) {
            renderError("Missing redirect URL from subscriber activation.");
            return;
          }

          window.location.assign(data.redirect_url);
        } catch (error) {
          renderError("Unable to activate Subscriber right now.");
        } finally {
          activeAction = "";
        }
      }

      function buildTierPath(tier) {
        return `/tier-select/${route.token}/${tier}`;
      }

      function readRoute() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const query = new URLSearchParams(window.location.search);
        const tokenFromPath = segments[0] === "tier-select" ? segments[1] : "";
        const token = tokenFromPath || query.get("token") || "";
        const tierFromPath = segments[0] === "tier-select" ? (segments[2] || "") : (query.get("tier") || "");
        const tier = String(tierFromPath || "").trim().toLowerCase();
        return {
          token,
          view: TIER_ORDER.includes(tier) ? tier : "landing",
        };
      }

      function renderError(message) {
        app.className = "error-box";
        app.textContent = message;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
