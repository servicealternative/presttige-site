<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
  <meta name="google" content="notranslate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Membership Selection</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <script src="/assets/js/preview-mode-banner.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-black: #0A0A0A;
      --pp-gold: #8A7544;
      --pp-paper: #FBF9F4;
      --pp-background: #F5F2ED;
      --pp-subscriber: #F8F4E8;
      --pp-stone: #E8E4DA;
      --pp-muted: #5F5B54;
      --pp-hairline: #D8D1C3;
      --pp-error: #8B1E1E;
      --pp-success-tint: rgba(140, 112, 64, 0.08);
      --pp-error-tint: rgba(139, 30, 30, 0.08);
      --pp-radius: 28px;
      --pp-shadow: 0 24px 60px rgba(10, 10, 10, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(140, 112, 64, 0.06), transparent 28%),
        linear-gradient(180deg, #F8F5EF 0%, var(--pp-background) 100%);
      color: var(--pp-black);
      font-family: "Source Serif 4", Georgia, serif;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(100%, 1340px);
      margin: 0 auto;
      padding: 28px 20px 64px;
    }

    .state,
    .error-state {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid var(--pp-hairline);
      background: var(--pp-paper);
      box-shadow: var(--pp-shadow);
    }

    .error-state {
      border-color: rgba(139, 30, 30, 0.2);
      background: linear-gradient(180deg, rgba(139, 30, 30, 0.04), rgba(251, 249, 244, 1));
    }

    .masthead {
      position: relative;
      display: grid;
      gap: 18px;
      margin-bottom: 30px;
      padding-right: min(260px, 28vw);
    }

    .eyebrow {
      margin: 0;
      color: var(--pp-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(36px, 4vw, 48px);
      font-style: normal;
      font-weight: 700;
      line-height: 1.1;
    }

    .lede {
      max-width: 620px;
      margin: 0;
      color: var(--pp-muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(19px, 2vw, 23px);
      line-height: 1.5;
    }

    .candidate-name {
      position: absolute;
      top: 2px;
      right: 0;
      max-width: 240px;
      color: var(--pp-muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: right;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid--standard {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      padding: 28px 28px 26px;
      border: 1px solid var(--pp-hairline);
      background: var(--pp-paper);
      box-shadow: var(--pp-shadow);
      overflow: hidden;
    }

    .card--patron {
      border-color: rgba(140, 112, 64, 0.45);
      background:
        radial-gradient(circle at top right, rgba(140, 112, 64, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(140, 112, 64, 0.08), rgba(251, 249, 244, 1) 28%);
    }

    .card--patron {
      padding-top: 32px;
    }

    .card--subscriber {
      background: var(--pp-subscriber);
    }

    .card-header {
      display: grid;
      gap: 12px;
      padding-right: 0;
    }

    .card-label {
      margin: 0;
      color: var(--pp-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .card-title {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(34px, 3.2vw, 44px);
      font-style: normal;
      font-weight: 600;
      line-height: 1.02;
    }

    .card-title--compact {
      font-size: clamp(34px, 3.2vw, 44px);
    }

    .price {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.45;
    }

    .price-note {
      margin: -8px 0 0;
      color: var(--pp-muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.5;
    }

    .copy {
      margin: 0;
      color: var(--pp-muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1.65;
    }

    .copy-group {
      display: grid;
      gap: 8px;
    }

    .closing {
      color: var(--pp-gold);
      font-size: 15px;
      font-style: italic;
      line-height: 1.55;
    }

    .section {
      padding-top: 14px;
      border-top: 1px solid rgba(140, 112, 64, 0.14);
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--pp-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.62;
    }

    .list li + li {
      margin-top: 6px;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: auto;
      padding-top: 8px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 14px 20px;
      border: 1px solid var(--pp-gold);
      background: var(--pp-gold);
      color: var(--pp-paper);
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-transform: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .button:hover,
    .button:focus-visible {
      opacity: 0.92;
    }

    .button[disabled] {
      cursor: wait;
      opacity: 0.65;
    }

    .button--subscriber {
      border-color: var(--pp-gold);
      background: var(--pp-gold);
      color: var(--pp-paper);
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .callout {
      padding: 14px 16px;
      border: 1px solid rgba(140, 112, 64, 0.18);
      background: rgba(140, 112, 64, 0.05);
      color: var(--pp-black);
      font-size: 14px;
      line-height: 1.6;
    }

    .callout strong {
      display: block;
      margin-bottom: 4px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .placeholder-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--pp-gold);
      font-size: 13px;
      text-decoration: none;
    }

    .placeholder-link:hover,
    .placeholder-link:focus-visible {
      text-decoration: underline;
    }

    .footer-note {
      margin-top: 26px;
      color: var(--pp-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .standard-view {
      display: grid;
      gap: 22px;
    }

    .tier-divider {
      width: 100%;
      height: 1px;
      background: rgba(138, 117, 68, 0.4);
    }

    .comparison-wrap {
      background: #FFFFFF;
    }

    .comparison {
      width: 100%;
      border-collapse: collapse;
      background: #FFFFFF;
    }

    .comparison th,
    .comparison td {
      padding: 16px 14px;
      border-bottom: 1px solid #DDDDDD;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .comparison th:first-child {
      padding-left: 0;
      color: var(--pp-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-align: left;
      text-transform: uppercase;
    }

    .comparison th:not(:first-child) {
      color: #1A1A1A;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-align: center;
      text-transform: uppercase;
    }

    .comparison td:first-child {
      padding-left: 0;
      color: #1A1A1A;
    }

    .comparison td:not(:first-child) {
      color: #1A1A1A;
      text-align: center;
    }

    .comparison-mark {
      color: var(--pp-gold);
      font-weight: 600;
    }

    .comparison-note {
      color: #1A1A1A;
      font-weight: 400;
    }

    .comparison-empty {
      color: #999999;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 767px) {
      .shell {
        padding-inline: 16px;
      }

      .masthead {
        padding-right: 0;
      }

      .candidate-name {
        position: static;
        max-width: none;
        text-align: left;
      }

      .title {
        font-size: 38px;
      }

      .grid--standard {
        grid-template-columns: minmax(0, 1fr);
        grid-template-areas: none;
      }

      .card,
      .card--patron {
        padding: 24px 22px 22px;
      }

      .card-header {
        padding-right: 0;
        padding-top: 0;
      }

      .comparison thead {
        display: none;
      }

      .comparison,
      .comparison tbody,
      .comparison tr,
      .comparison td {
        display: block;
        width: 100%;
      }

      .comparison tr {
        padding: 18px 0;
        border-bottom: 1px solid #DDDDDD;
      }

      .comparison td {
        padding: 0;
        border: 0;
      }

      .comparison td:first-child {
        margin-bottom: 12px;
        font-size: 16px;
        line-height: 1.55;
      }

      .comparison td[data-tier-label] {
        display: inline-flex;
        width: auto;
        align-items: center;
        margin: 0 8px 8px 0;
        padding: 8px 12px;
        border: 1px solid #DDDDDD;
        background: #FFFFFF;
        font-size: 14px;
      }

      .comparison td[data-tier-label]::before {
        content: attr(data-tier-label);
        margin-right: 8px;
        color: #1A1A1A;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/brand-fonts.css">
  <link rel="stylesheet" href="/assets/css/preview-mode-banner.css">
</head>
<body translate="no">
  <main class="shell">
    <div id="app" class="state">Loading your membership options…</div>
  </main>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com";
      const REQUEST_NEW_LINK = "mailto:office@presttige.net?subject=Request%20a%20new%20Presttige%20link";
      const app = document.getElementById("app");
      const route = readRoute();
      const state = {
        token: route.token,
        tokenSource: route.token,
        sourceToken: route.token,
        leadId: route.leadId,
        context: null,
        loadingAction: "",
        selectedBilling: {
          club: "yearly",
          premier: "yearly",
        },
      };

      const COPY = {
        subscriber: {
          label: "ACCESS POINT",
          title: "Subscriber",
          bodyLines: [
            "You have been approved.",
            "No payment required at this stage.",
            "Your place is recognised. Your membership — Club, Premier, or Patron — is yours to choose, when you choose.",
          ],
          cta: "Confirm subscription",
        },
        club: {
          label: "ENTRY",
          title: "Club",
          leadLines: ["Your entry into the network."],
          sections: [
            {
              title: "INCLUDES",
              items: [
                "— The member directory",
                "— Network communications",
                "— Invitations to gatherings",
              ],
            },
            {
              title: "RENEWAL",
              body: "Annual. At your discretion.",
            },
          ],
          closing: "Club is where you begin.",
        },
        premier: {
          label: "PRESENCE",
          title: "Premier",
          leadLines: [
            "A central position within the network, with the right to introduce proposals to the committee.",
          ],
          sections: [
            {
              title: "INCLUDES",
              items: [
                "— The member directory",
                "— Proposal rights, with priority review",
                "— Network communications",
                "— Invitations to selected gatherings",
              ],
            },
            {
              title: "RENEWAL",
              body: "Annual. At your discretion.",
            },
          ],
          closing: "Premier is where access becomes influence.",
        },
        patron: {
          label: "BY EXCEPTION",
          title: "Patron",
          leadLines: [
            "The closest position to Presttige.",
            "A direct line into the network and its founders.",
          ],
          sections: [
            {
              title: "INCLUDES",
              items: [
                "— Full network access",
                "— Direct founder line",
                "— Priority within the proposal process",
                "— Invitations to private events and gatherings",
                "— Concierge in key cities",
                "— Access to select services beyond the programme",
              ],
            },
            {
              title: "RENEWAL",
              body: "Annual. At your discretion.",
            },
          ],
          closing: "Patron is not an upgrade. It is proximity.",
        },
      };

      const COMPARISON_ROWS = [
        {
          feature: "Member directory",
          values: {
            subscriber: "—",
            club: "✓",
            premier: "✓",
            patron: "✓",
          },
        },
        {
          feature: "Network communications",
          values: {
            subscriber: "—",
            club: "✓",
            premier: "✓",
            patron: "✓",
          },
        },
        {
          feature: "Event invitations",
          values: {
            subscriber: "—",
            club: "✓",
            premier: "✓",
            patron: "✓",
          },
        },
        {
          feature: "Proposal rights",
          values: {
            subscriber: "—",
            club: "—",
            premier: "✓",
            patron: "✓ priority",
          },
        },
        {
          feature: "Direct founder line",
          values: {
            subscriber: "—",
            club: "—",
            premier: "—",
            patron: "✓",
          },
        },
        {
          feature: "Concierge in key cities",
          values: {
            subscriber: "—",
            club: "—",
            premier: "—",
            patron: "✓",
          },
        },
        {
          feature: "Services beyond programme",
          values: {
            subscriber: "—",
            club: "—",
            premier: "—",
            patron: "✓",
          },
        },
        {
          feature: "Private events",
          values: {
            subscriber: "—",
            club: "—",
            premier: "—",
            patron: "✓",
          },
        },
      ];

      if (!state.token) {
        renderFatal("Missing membership selection link.");
        return;
      }

      if (window.PresttigePreview) {
        window.PresttigePreview.syncFromQuery();
      }

      load();

      async function load() {
        try {
          state.context = await fetchJson(buildContextUrl());
          state.leadId = state.context.profile?.leadId || state.leadId;
          state.sourceToken = state.context.token?.magicToken || state.token;
          if (state.context.previewMode && window.PresttigePreview) {
            window.PresttigePreview.enable();
          }
          render();
        } catch (error) {
          const details = error?.body?.error || {};
          renderFatal(details.message || error.message || "Unable to load your membership options right now.");
        }
      }

      function render() {
        const profileName = state.context.profile?.name || "Presttige candidate";

        app.className = "";
        app.innerHTML = `
          <section class="masthead">
            <div class="candidate-name">${escapeHtml(profileName)}</div>
            <h1 class="title">Choose your membership</h1>
            <p class="lede">Define your level of access within the network. Patron sits at the centre of the programme, while Club and Premier shape the same circle at more selective depths.</p>
          </section>
          ${renderStandardView()}
          <p class="footer-note">If this link no longer works, <a class="placeholder-link" href="${REQUEST_NEW_LINK}">request a new one</a>.</p>
        `;
        bind();
      }

      function renderStandardView() {
        return `
          <section class="standard-view" data-tier-visibility="standard">
            <div class="grid grid--standard">
              ${renderSubscriberCard()}
              ${renderPaidCard("club", state.context.options.club)}
              ${renderPaidCard("premier", state.context.options.premier)}
              ${renderPaidCard("patron", state.context.options.patron)}
            </div>
            <div class="tier-divider" aria-hidden="true"></div>
            ${renderComparisonTable()}
          </section>
        `;
      }

      function renderPaidCard(tier, option) {
        const copy = COPY[tier];
        const cardClass = [
          "card",
          tier === "patron" ? "card--patron" : "",
          tier === "premier" ? "card--premier" : "",
          tier === "club" ? "card--club" : "",
        ]
          .filter(Boolean)
          .join(" ");
        const currentContractKey = resolveActiveContractKey(tier, option);
        const selectedPrice = describeHeadlinePrice(option, tier);
        const priceNote = describePriceNote(tier);
        const callout = buildTierCallout(tier, option);

        return `
          <article class="${cardClass}" data-tier-card="${escapeHtml(tier)}">
            <header class="card-header">
              <p class="card-label">${escapeHtml(copy.label)}</p>
              <h2 class="card-title card-title--compact">${escapeHtml(copy.title)}</h2>
              <p class="price" data-tier-price="${escapeHtml(tier)}">${escapeHtml(selectedPrice)}</p>
              ${priceNote ? `<p class="price-note">${escapeHtml(priceNote)}</p>` : ""}
              ${renderCopyGroup(copy.leadLines)}
            </header>
            ${
              callout
                ? `<div class="callout"><strong>${escapeHtml(callout.label)}</strong>${escapeHtml(callout.body)}</div>`
                : ""
            }
            ${copy.sections.map(renderSection).join("")}
            ${copy.closing ? `<p class="copy closing">${escapeHtml(copy.closing)}</p>` : ""}
            <div class="actions">
              <button type="button" class="button" data-begin-checkout="${escapeHtml(currentContractKey)}" ${isBusy(currentContractKey) ? "disabled" : ""}>
                ${isBusy(currentContractKey) ? "Loading…" : escapeHtml(buttonLabel(tier, option))}
              </button>
            </div>
          </article>
        `;
      }

      function renderSubscriberCard() {
        const copy = COPY.subscriber;
        return `
          <article class="card card--subscriber" data-tier-card="subscriber">
            <header class="card-header">
              <p class="card-label">${escapeHtml(copy.label)}</p>
              <h2 class="card-title card-title--compact">${escapeHtml(copy.title)}</h2>
              ${renderCopyGroup(copy.bodyLines)}
            </header>
            <div class="actions">
              <button type="button" class="button button--subscriber" data-activate-subscriber="true" ${!state.context.token?.magicToken || isBusy("subscriber") ? "disabled" : ""}>
                ${isBusy("subscriber") ? "Activating…" : escapeHtml(copy.cta)}
              </button>
            </div>
          </article>
        `;
      }

      function renderSection(section) {
        return `
          <section class="section">
            <h3 class="section-title">${escapeHtml(section.title)}</h3>
            ${
              Array.isArray(section.items)
                ? `<ul class="list">
                    ${section.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                  </ul>`
                : `<p class="copy">${escapeHtml(section.body || "")}</p>`
            }
          </section>
        `;
      }

      function renderCopyGroup(lines) {
        if (!Array.isArray(lines) || lines.length === 0) {
          return "";
        }

        return `
          <div class="copy-group">
            ${lines.map((line) => `<p class="copy">${escapeHtml(line)}</p>`).join("")}
          </div>
        `;
      }

      function renderComparisonTable() {
        return `
          <div class="comparison-wrap">
            <table class="comparison">
              <thead>
                <tr>
                  <th scope="col">Feature</th>
                  <th scope="col">Subscriber</th>
                  <th scope="col">Club</th>
                  <th scope="col">Premier</th>
                  <th scope="col">Patron</th>
                </tr>
              </thead>
              <tbody>
                ${COMPARISON_ROWS.map(renderComparisonRow).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderComparisonRow(row) {
        return `
          <tr>
            <td>${escapeHtml(row.feature)}</td>
            ${renderComparisonCell("Subscriber", row.values.subscriber)}
            ${renderComparisonCell("Club", row.values.club)}
            ${renderComparisonCell("Premier", row.values.premier)}
            ${renderComparisonCell("Patron", row.values.patron)}
          </tr>
        `;
      }

      function renderComparisonCell(label, value) {
        let content = `<span class="comparison-empty">—</span>`;

        if (value !== "—") {
          const [mark, note] = String(value).split(" ", 2);
          content = `<span class="comparison-mark">${escapeHtml(mark)}</span>${note ? ` <span class="comparison-note">${escapeHtml(note)}</span>` : ""}`;
        }

        return `<td data-tier-label="${escapeHtml(label)}">${content}</td>`;
      }

      function bind() {
        app.querySelectorAll("[data-begin-checkout]").forEach((button) => {
          button.addEventListener("click", async () => {
            const contractKey = button.getAttribute("data-begin-checkout");
            await beginCheckout(contractKey);
          });
        });

        app.querySelectorAll("[data-activate-subscriber]").forEach((button) => {
          button.addEventListener("click", activateSubscriber);
        });
      }

      async function beginCheckout(contractKey) {
        state.loadingAction = contractKey;
        render();

        try {
          const contract = findContract(contractKey);
          if (!contract) {
            renderFatal("This link does not allow that membership choice.");
            return;
          }

          if (state.context.previewMode) {
            const previewActivation = await fetchJson(`${API_BASE}/activate-subscriber`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                token: state.context.token.magicToken,
                preview_tier: contract.tier,
                contract_key: contractKey,
              }),
            });
            window.location.assign(
              previewActivation.redirect_url ||
                `/preview/success/?token=${encodeURIComponent(state.context.token.magicToken)}&tier=${encodeURIComponent(contract.tier)}&preview=1`
            );
            return;
          }

          if (!state.leadId || !state.context.token?.magicToken) {
            renderFatal("This link cannot open checkout yet. Please request a new one.");
            return;
          }

          const minted = await fetchJson(`${API_BASE}/checkout-context`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              lead_id: state.leadId,
              token: state.context.token.magicToken,
              contract_key: contractKey,
            }),
          });

          state.context.token.checkoutToken = minted.checkoutToken;
          state.context.token.checkoutTokenStatus = minted.checkoutTokenStatus;
          state.context.token.checkoutTokenExpiresAt = minted.checkoutTokenExpiresAt;

          const tierSegment = contract?.tier || "checkout";
          const query = new URLSearchParams({
            token: minted.checkoutToken,
          });

          if (state.sourceToken && state.sourceToken !== minted.checkoutToken) {
            query.set("source_token", state.sourceToken);
          }

          window.location.assign(`/checkout/${encodeURIComponent(tierSegment)}/${encodeURIComponent(contractKey)}?${query.toString()}`);
        } catch (error) {
          const details = error?.body?.error || {};
          renderFatal(details.message || error.message || "Unable to prepare checkout right now.");
        } finally {
          state.loadingAction = "";
        }
      }

      async function activateSubscriber() {
        if (!state.context.token?.magicToken) {
          renderFatal("Subscriber confirmation requires the original membership selection link.");
          return;
        }

        state.loadingAction = "subscriber";
        render();
        const previewParam = state.context.previewMode ? "?preview=1" : "";
        const subscriberUrl = `/subscriber/${encodeURIComponent(state.context.token.magicToken)}${previewParam}`;
        window.location.assign(subscriberUrl);
      }

      function buildTierCallout(tier, option) {
        if (tier === "patron" && option.displayMode === "upgrade") {
          return {
            label: "Upgrade window",
            body: `This selection applies the ${titleCase(option.upgradeFrom)} to Patron upgrade rate today.`,
          };
        }

        return null;
      }

      function resolveActiveContractKey(tier, option) {
        if (!option.billingChoices || option.billingChoices.length === 0) {
          return option.contractKey;
        }

        const billing = state.selectedBilling[tier];
        const selected = option.billingChoices.find((choice) => choice.billing === billing);
        return (selected || option.billingChoices[0]).contractKey;
      }

      function buttonLabel(tier, option) {
        if (tier === "patron" && option.displayMode === "upgrade") {
          return "Choose Patron";
        }
        return `Choose ${COPY[tier].title}`;
      }

      function describeHeadlinePrice(option, tier) {
        if (!option) {
          return "";
        }

        if (option.headlinePriceLabel) {
          return option.headlinePriceLabel;
        }

        if (tier === "club") {
          return "$144.44 / year";
        }
        if (tier === "premier") {
          return "$388.88 / year";
        }
        if (tier === "patron") {
          return "$999 / year";
        }

        return "";
      }

      function describePriceNote(tier) {
        const noteByTier = {
          club: "$12.04 / month",
          premier: "$32.41 / month",
        };

        return noteByTier[tier] || "";
      }

      function findContract(contractKey) {
        const optionSets = Object.values(state.context.options || {});
        for (const option of optionSets) {
          if (!option) {
            continue;
          }
          if (option.contractKey === contractKey) {
            return option;
          }
          if (Array.isArray(option.billingChoices)) {
            const found = option.billingChoices.find((choice) => choice.contractKey === contractKey);
            if (found) {
              return {
                tier: option.tier,
                contractKey: found.contractKey,
              };
            }
          }
        }
        return null;
      }

      function isBusy(action) {
        return state.loadingAction === action;
      }

      function renderFatal(message) {
        app.className = "error-state";
        app.innerHTML = `
          <p class="eyebrow">Presttige Membership Selection</p>
          <h1 class="title">Link unavailable.</h1>
          <p class="lede">${escapeHtml(message)}</p>
          <p class="footer-note"><a class="placeholder-link" href="${REQUEST_NEW_LINK}">Request a new link</a></p>
        `;
      }

      function buildContextUrl() {
        const query = new URLSearchParams({
          token: state.token,
        });

        if (state.leadId) {
          query.set("lead_id", state.leadId);
        }

        return `${API_BASE}/checkout-context?${query.toString()}`;
      }

      async function fetchJson(url, init) {
        const response = await fetch(url, init);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const error = new Error(data?.error?.message || data.error || "Request failed");
          error.statusCode = response.status;
          error.body = data;
          throw error;
        }
        return data;
      }

      function formatUsd(cents) {
        const number = Number(cents || 0) / 100;
        return new Intl.NumberFormat("en-US", {
          minimumFractionDigits: number % 1 === 0 ? 0 : 2,
          maximumFractionDigits: 2,
        }).format(number);
      }

      function titleCase(value) {
        return String(value || "")
          .split(/[_\s-]+/)
          .filter(Boolean)
          .map((segment) => segment.charAt(0).toUpperCase() + segment.slice(1))
          .join(" ");
      }

      function readRoute() {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const query = new URLSearchParams(window.location.search);
        const pathToken = segments[0] === "tier-select" ? segments[1] : "";
        return {
          token: pathToken || query.get("token") || "",
          leadId: query.get("lead_id") || "",
        };
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
