<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presttige Membership</title>
  <script src="/assets/js/consent-banner.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pp-primary: #0A0A0A;
      --pp-paper: #FBF9F4;
      --pp-background: #F5F2ED;
      --pp-accent: #8C7040;
      --pp-muted: #4A4A4A;
      --pp-hairline: #D9D2C5;
      --pp-error: #9F1D1D;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--pp-background);
      color: var(--pp-primary);
      font-family: "Source Serif Pro", Georgia, serif;
    }

    .tier-shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 54px 24px 72px;
    }

    .tier-eyebrow {
      margin: 0 0 16px;
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .tier-title {
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(44px, 7vw, 72px);
      line-height: 0.96;
    }

    .tier-intro {
      max-width: 780px;
      margin: 0 0 34px;
      color: var(--pp-muted);
      font-size: 17px;
      line-height: 1.76;
    }

    .tier-state,
    .tier-error {
      padding: 24px;
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
    }

    .tier-error {
      color: var(--pp-error);
    }

    .tier-toggle {
      display: inline-flex;
      gap: 0;
      margin-bottom: 34px;
      border: 1px solid var(--pp-hairline);
      background: var(--pp-paper);
    }

    .tier-toggle button {
      min-height: 44px;
      padding: 0 20px;
      border: none;
      background: transparent;
      color: var(--pp-muted);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .tier-toggle button.is-active {
      background: var(--pp-primary);
      color: var(--pp-paper);
    }

    .tier-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .tier-card {
      display: grid;
      align-content: start;
      gap: 18px;
      min-height: 100%;
      padding: 48px 32px;
      background: var(--pp-paper);
      border: 1px solid var(--pp-hairline);
      border-radius: 4px;
    }

    .tier-card--patron {
      background: linear-gradient(180deg, rgba(140, 112, 64, 0.08) 0%, rgba(251, 249, 244, 0.94) 100%);
      border-color: rgba(140, 112, 64, 0.52);
    }

    .tier-card__eyebrow {
      margin: 0;
      color: var(--pp-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .tier-card__title {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 38px;
      line-height: 0.98;
    }

    .tier-card__subtitle {
      margin: -8px 0 0;
      color: var(--pp-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .tier-card__copy {
      margin: 0;
      color: var(--pp-muted);
      font-size: 16px;
      line-height: 1.76;
    }

    .tier-card__bonus {
      display: none;
      margin: 0;
      padding-top: 16px;
      border-top: 1px solid rgba(140, 112, 64, 0.18);
      color: var(--pp-primary);
      font-size: 15px;
      line-height: 1.7;
    }

    .tier-grid.is-annual .tier-card__bonus[data-has-bonus="true"] {
      display: block;
    }

    .tier-card__button {
      margin-top: auto;
      min-height: 44px;
      padding: 0 20px;
      border: 1px solid var(--pp-accent);
      background: transparent;
      color: var(--pp-accent);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .tier-card__button:hover:not(:disabled) {
      background: var(--pp-primary);
      border-color: var(--pp-primary);
      color: var(--pp-paper);
    }

    .tier-card--patron .tier-card__button {
      background: var(--pp-primary);
      border-color: var(--pp-primary);
      color: var(--pp-paper);
    }

    .tier-card__button:disabled {
      opacity: 0.55;
      cursor: progress;
    }

    .tier-footer {
      margin: 28px 0 0;
      color: var(--pp-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 1080px) {
      .tier-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .tier-shell {
        padding: 44px 20px 60px;
      }

      .tier-grid {
        grid-template-columns: 1fr;
      }

      .tier-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="tier-shell">
    <p class="tier-eyebrow">Presttige Membership</p>
    <h1 class="tier-title">Choose your path</h1>
    <p class="tier-intro">Four ways to participate. Three private tiers and one complimentary path. Your selection determines the depth of your access — and how others will encounter you within the network.</p>
    <section id="app" class="tier-state">Loading your membership options…</section>
  </main>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://rwkz3d86u0.execute-api.us-east-1.amazonaws.com";
      const token = window.location.pathname.split("/").filter(Boolean).pop();
      const app = document.getElementById("app");
      const CARD_ORDER = ["free", "tier3", "tier2", "patron"];
      const CARD_COPY = {
        free: {
          eyebrow: "COMPLIMENTARY PATH",
          title: "Complimentary",
          subtitle: "Entry path",
          body: "A starting point for those whose stories will unfold privately, in conversation. Limited access by design. Curated invitations rather than open participation.",
          bonus: "",
          cta: "Activate complimentary path",
          variant: "",
        },
        tier3: {
          eyebrow: "MEMBERSHIP TIER",
          title: "Affiliate",
          subtitle: "Entry level",
          body: "For those entering the network with intent. Access to the private directory, curated introductions, and select committee-hosted gatherings.",
          bonus: "★ Annual subscription includes Associate access for twelve months. Experience the next tier in full.",
          cta: "Continue to Affiliate",
          variant: "",
        },
        tier2: {
          eyebrow: "MEMBERSHIP TIER",
          title: "Associate",
          subtitle: "Established",
          body: "For members whose presence carries weight. Direct committee access, private events in Dubai, London, and New York, and the ability to propose new members.",
          bonus: "★ Annual subscription includes Patron access for twelve months. The full network, at the highest tier.",
          cta: "Continue to Associate",
          variant: "",
        },
        patron: {
          eyebrow: "HIGHEST TIER",
          title: "Patron",
          subtitle: "By exception",
          body: "The inner circle. Direct access to founders, private salons, philanthropic alignment, and the discretion appropriate to the level.",
          bonus: "★ Annual subscription. Full network access across all gatherings, geographies, and introductions.",
          cta: "Continue to Patron",
          variant: "tier-card--patron",
        },
      };

      let periodicity = "annual";
      let payload = null;
      let activeTier = "";

      if (!token || token === "tier-select" || token === "tier-select.html") {
        renderError("Missing tier selection token.");
        return;
      }

      load();

      async function load() {
        try {
          const response = await fetch(`${API_BASE}/tier-select-fetch?token=${encodeURIComponent(token)}`);
          const data = await response.json();

          if (response.status === 410) {
            renderError("This invitation has expired or was already used");
            return;
          }

          if (!response.ok) {
            renderError(data.error || "Unable to load your membership options.");
            return;
          }

          payload = data;
          render();
        } catch (error) {
          renderError("Unable to load your membership options right now.");
        }
      }

      function render() {
        app.className = "";
        app.innerHTML = `
          <div class="tier-toggle">
            <button type="button" data-period="monthly" class="${periodicity === "monthly" ? "is-active" : ""}">Monthly</button>
            <button type="button" data-period="annual" class="${periodicity === "annual" ? "is-active" : ""}">Annual — Includes Tier Upgrade</button>
          </div>
          <div class="tier-grid ${periodicity === "annual" ? "is-annual" : ""}">
            ${CARD_ORDER.map((tierKey) => renderCard(tierKey)).join("")}
          </div>
          <p class="tier-footer">Pricing details are presented at the next step. Subscriptions can be paused or cancelled at any time, in accordance with our Terms.</p>
        `;

        app.querySelectorAll("[data-period]").forEach((button) => {
          button.addEventListener("click", () => {
            periodicity = button.dataset.period;
            render();
          });
        });

        app.querySelectorAll("[data-tier]").forEach((button) => {
          button.addEventListener("click", () => beginCheckout(button.dataset.tier));
        });
      }

      function renderCard(tierKey) {
        const copy = CARD_COPY[tierKey];
        const disabled = activeTier === tierKey ? "disabled" : "";
        const buttonLabel = activeTier === tierKey ? "Redirecting…" : copy.cta;
        return `
          <article class="tier-card ${copy.variant}">
            <p class="tier-card__eyebrow">${copy.eyebrow}</p>
            <h2 class="tier-card__title">${copy.title}</h2>
            <p class="tier-card__subtitle">${copy.subtitle}</p>
            <p class="tier-card__copy">${copy.body}</p>
            <p class="tier-card__bonus" data-has-bonus="${copy.bonus ? "true" : "false"}">${copy.bonus}</p>
            <button type="button" class="tier-card__button" data-tier="${tierKey}" ${disabled}>${buttonLabel}</button>
          </article>
        `;
      }

      async function beginCheckout(tier) {
        activeTier = tier;
        render();

        try {
          const response = await fetch(`${API_BASE}/create-checkout-session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token,
              tier,
              periodicity: tier === "free" ? "monthly" : periodicity,
            }),
          });
          const data = await response.json();

          if (!response.ok) {
            renderError(data.error || "Unable to continue right now.");
            return;
          }

          if (data.redirect_url) {
            window.location.assign(data.redirect_url);
            return;
          }

          renderError("Missing redirect URL from checkout session.");
        } catch (error) {
          renderError("Unable to continue right now.");
        } finally {
          activeTier = "";
        }
      }

      function renderError(message) {
        app.className = "tier-error";
        app.textContent = message;
      }
    })();
  </script>
</body>
</html>
