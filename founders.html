<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige Founding Members</title>
  <meta name="description" content="Presttige Founding Membership. Private. Selective. Prestigious. Early access for selected members before launch." />
  <style>
    :root{
      --bg:#050505;
      --panel:#101010;
      --panel-2:#161616;
      --line:rgba(212,176,106,0.18);
      --gold:#d4b06a;
      --gold-strong:#e2bf78;
      --text:#f5f5f5;
      --muted:#b7b7b7;
      --muted-2:#8f8f8f;
      --radius-xl:28px;
      --radius-lg:20px;
      --radius-md:14px;
      --shadow:0 24px 70px rgba(0,0,0,0.45);
      --max:1220px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,176,106,0.10), transparent 26%),
        radial-gradient(circle at top left, rgba(212,176,106,0.05), transparent 20%),
        linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9)),
        #050505;
      color:var(--text);
      line-height:1.45;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
    }

    .topbar{
      background:linear-gradient(90deg,#7f0c0c,#cb1c1c);
      color:#fff;
      text-align:center;
      padding:10px 14px;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.12em;
      text-transform:uppercase;
    }

    .header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(16px);
      background:rgba(5,5,5,0.82);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .header-inner{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:0.16em;
      font-weight:700;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border:1px solid rgba(212,176,106,0.55);
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:14px;
      line-height:1;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:26px;
    }

    .nav a{
      color:rgba(255,255,255,0.9);
      font-size:15px;
      transition:0.25s ease;
    }

    .nav a:hover{
      color:var(--gold);
    }

    .header-btn,
    .primary-btn,
    .secondary-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 26px;
      border-radius:999px;
      font-weight:700;
      transition:0.25s ease;
    }

    .header-btn,
    .primary-btn{
      background:var(--gold);
      color:#111;
      box-shadow:0 10px 30px rgba(212,176,106,0.18);
    }

    .header-btn:hover,
    .primary-btn:hover{
      transform:translateY(-1px);
      background:var(--gold-strong);
    }

    .secondary-btn{
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.02);
      color:#fff;
    }

    .secondary-btn:hover{
      border-color:rgba(212,176,106,0.35);
      color:var(--gold);
    }

    .hero{
      padding:68px 0 38px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:30px;
      align-items:stretch;
    }

    .hero-left,
    .hero-right{
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      background:linear-gradient(180deg, rgba(18,18,18,0.94), rgba(8,8,8,0.98));
      box-shadow:var(--shadow);
    }

    .hero-left{
      padding:54px 52px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(212,176,106,0.08);
      border:1px solid rgba(212,176,106,0.18);
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:24px;
    }

    h1{
      margin:0 0 18px;
      font-size:clamp(42px, 7vw, 78px);
      line-height:0.95;
      letter-spacing:-0.045em;
      max-width:760px;
    }

    .hero-subtitle{
      margin:0 0 24px;
      max-width:760px;
      color:var(--muted);
      font-size:21px;
      line-height:1.55;
    }

    .scarcity{
      display:inline-block;
      margin:0 0 24px;
      padding:11px 16px;
      border-radius:999px;
      background:rgba(212,176,106,0.08);
      border:1px solid rgba(212,176,106,0.20);
      color:var(--gold);
      font-size:14px;
      font-weight:700;
      letter-spacing:0.03em;
    }

    .hero-points{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:14px;
      margin:0 0 28px;
    }

    .point{
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.02);
      border-radius:18px;
      padding:18px;
    }

    .point strong{
      display:block;
      color:var(--gold);
      font-size:16px;
      margin-bottom:6px;
    }

    .point span{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:6px;
    }

    .hero-right{
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:20px;
      justify-content:space-between;
    }

    .price-box{
      border:1px solid rgba(212,176,106,0.18);
      background:linear-gradient(180deg, rgba(212,176,106,0.08), rgba(255,255,255,0.02));
      border-radius:24px;
      padding:28px;
    }

    .price-label{
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:12px;
    }

    .price{
      font-size:56px;
      font-weight:800;
      letter-spacing:-0.05em;
      line-height:1;
      margin-bottom:10px;
    }

    .price span{
      font-size:20px;
      color:var(--muted);
      font-weight:600;
      letter-spacing:0;
    }

    .price-text{
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      margin:0 0 18px;
    }

    .feature-list{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap:12px;
    }

    .feature-list li{
      display:flex;
      align-items:flex-start;
      gap:10px;
      color:rgba(255,255,255,0.92);
      font-size:15px;
      line-height:1.55;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--gold);
      margin-top:8px;
      flex:0 0 auto;
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:14px;
    }

    .mini-stat{
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.02);
      border-radius:18px;
      padding:18px;
    }

    .mini-stat strong{
      display:block;
      color:var(--gold);
      font-size:24px;
      margin-bottom:5px;
      letter-spacing:-0.03em;
    }

    .mini-stat span{
      color:var(--muted);
      font-size:14px;
    }

    .section{
      padding:26px 0;
    }

    .section-head{
      margin-bottom:22px;
    }

    .section-kicker{
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:0.12em;
      margin-bottom:10px;
    }

    .section h2{
      margin:0;
      font-size:clamp(30px, 4vw, 48px);
      letter-spacing:-0.04em;
      line-height:1.03;
    }

    .section-intro{
      margin-top:14px;
      max-width:780px;
      color:var(--muted);
      font-size:18px;
      line-height:1.6;
    }

    .grid-3,
    .grid-2,
    .cities{
      display:grid;
      gap:20px;
    }

    .grid-3{
      grid-template-columns:repeat(3, 1fr);
    }

    .grid-2{
      grid-template-columns:repeat(2, 1fr);
    }

    .cities{
      grid-template-columns:repeat(5, 1fr);
    }

    .card{
      background:linear-gradient(180deg, rgba(17,17,17,0.95), rgba(10,10,10,0.98));
      border:1px solid rgba(255,255,255,0.07);
      border-radius:22px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .card h3{
      margin:0 0 10px;
      font-size:22px;
      letter-spacing:-0.03em;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }

    .city{
      text-align:center;
      padding:22px 14px;
    }

    .city strong{
      display:block;
      font-size:18px;
      margin-bottom:8px;
      color:rgba(255,255,255,0.95);
    }

    .city span{
      color:var(--muted-2);
      font-size:14px;
    }

    .timeline{
      display:grid;
      gap:14px;
    }

    .timeline-item{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:18px;
      padding:18px 20px;
      border-radius:18px;
      background:rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.06);
    }

    .timeline-item strong{
      color:var(--gold);
      font-size:14px;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .timeline-item div{
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }

    .faq{
      display:grid;
      gap:14px;
    }

    .faq-item{
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:20px 22px;
      background:rgba(255,255,255,0.02);
    }

    .faq-item strong{
      display:block;
      margin-bottom:8px;
      font-size:17px;
      color:rgba(255,255,255,0.94);
    }

    .faq-item p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }

    .cta-section{
      padding:34px 0 84px;
    }

    .cta-box{
      border:1px solid rgba(212,176,106,0.2);
      border-radius:30px;
      background:
        linear-gradient(180deg, rgba(212,176,106,0.10), rgba(255,255,255,0.02)),
        rgba(10,10,10,0.96);
      box-shadow:var(--shadow);
      padding:42px;
      text-align:center;
    }

    .cta-box h2{
      margin:0 0 12px;
      font-size:clamp(32px, 4vw, 50px);
      letter-spacing:-0.04em;
    }

    .cta-box p{
      margin:0 auto 24px;
      max-width:760px;
      color:var(--muted);
      font-size:18px;
      line-height:1.6;
    }

    .cta-note{
      margin-top:16px;
      color:var(--muted-2);
      font-size:13px;
      line-height:1.6;
    }

    .footer{
      border-top:1px solid rgba(255,255,255,0.06);
      padding:22px 0 34px;
    }

    .footer-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      flex-wrap:
