<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Confirm</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --border: rgba(255,255,255,0.08);
      --text: #f5f1e8;
      --muted: rgba(245,241,232,0.65);
      --gold: #d4b06a;
      --gold-soft: rgba(212,176,106,0.18);
      --success: #d4b06a;
      --error: #d96b6b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.06;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .status {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-size: 28px;
    }

    .status.loading {
      border-color: rgba(212,176,106,0.3);
      background: var(--gold-soft);
    }

    .status.success {
      border-color: rgba(212,176,106,0.3);
      background: var(--gold-soft);
      color: var(--success);
    }

    .status.error {
      border-color: rgba(217,107,107,0.3);
      background: rgba(217,107,107,0.12);
      color: var(--error);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(212,176,106,0.25);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .actions {
      margin-top: 26px;
      display: none;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--gold);
      color: #111;
      border: 1px solid var(--gold);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .small-note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(245,241,232,0.45);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="statusIcon" class="status loading">
        <div class="spinner"></div>
      </div>

      <div class="eyebrow">Presttige</div>

      <h1 id="title">Confirming your request</h1>
      <p id="message">
        Please wait while we validate your request.
      </p>

      <div id="actions" class="actions">
        <a class="btn btn-primary" href="/">Return to Presttige</a>
      </div>

      <div class="small-note">Private. Selective. Prestigious.</div>
    </div>
  </div>

  <script>
    const CONFIRM_API_BASE = "https://leihfubadspd3sfqalqanjmkha0vqjes.lambda-url.us-east-1.on.aws/";

    const statusIcon = document.getElementById("statusIcon");
    const titleEl = document.getElementById("title");
    const messageEl = document.getElementById("message");
    const actionsEl = document.getElementById("actions");

    function setState(type, title, message, showActions = true) {
      statusIcon.className = `status ${type}`;
      statusIcon.innerHTML =
        type === "loading"
          ? '<div class="spinner"></div>'
          : type === "success"
          ? "✓"
          : "!";

      titleEl.textContent = title;
      messageEl.textContent = message;
      actionsEl.style.display = showActions ? "flex" : "none";
    }

    async function runConfirmation() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        setState(
          "error",
          "Invalid link",
          "This confirmation link is incomplete or invalid."
        );
        return;
      }

      try {
        const response = await fetch(`${CONFIRM_API_BASE}?token=${encodeURIComponent(token)}`, {
          method: "GET"
        });

        const text = await response.text();

        if (!response.ok) {
          setState(
            "error",
            "Unable to confirm",
            text || "We could not validate your request at this time."
          );
          return;
        }

        if (text.toLowerCase().includes("already confirmed")) {
          setState(
            "success",
            "Already confirmed",
            "Your request has already been confirmed."
          );
          return;
        }

        setState(
          "success",
          "Request confirmed",
          "Your request has been confirmed successfully. We will contact you shortly."
        );
      } catch (error) {
        setState(
          "error",
          "Confirmation unavailable",
          "A temporary error occurred while validating your request. Please try again later."
        );
      }
    }

    runConfirmation();
  </script>
</body>
</html>
