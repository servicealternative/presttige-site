<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Presttige Member</title>
</head>

<body style="background:black;color:white;">

<h1>Member Area</h1>
<div id="data"></div>

<script>
const API = "https://YOUR_API_GATEWAY_URL";

async function validate() {
    const token = localStorage.getItem("presttige_token");

    if (!token) {
        window.location.href = "/";
        return;
    }

    const res = await fetch(`${API}/gateway?validate_token=${token}`);
    const data = await res.json();

    if (!data.valid) {
        window.location.href = "/";
        return;
    }

    document.getElementById("data").innerHTML = `
        Status: ${data.access_status} <br>
        Product: ${data.product} <br>
        Plan: ${data.plan || "-"}
    `;
}

validate();
</script>

</body>
</html>
