<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presttige — Access</title>

<style>
body {
    margin: 0;
    background: #0b0b0c;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
}

h1 {
    font-size: 42px;
    font-weight: 300;
    text-align: center;
    margin-bottom: 20px;
}

.subtitle {
    text-align: center;
    opacity: 0.6;
    margin-bottom: 80px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
}

.card {
    border: 1px solid rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
}

.card h2 {
    font-weight: 400;
    margin-bottom: 10px;
}

.card p {
    opacity: 0.7;
}

button {
    margin-top: 30px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #d4b06a;
    color: #000;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Presttige is not open.</h1>
<p class="subtitle">Access is granted selectively.</p>

<div class="grid">

<div class="card">
<h2>Founder</h2>
<p>Permanent positioning. Early access.</p>
<button onclick="goFounder()">Apply as Founder</button>
</div>

<div class="card">
<h2>Access</h2>
<p>Entry into the network.</p>
<button onclick="goAccess()">Request Access</button>
</div>

<div class="card">
<h2>Membership</h2>
<p>Ongoing presence and visibility.</p>
<button onclick="goMembership()">Become a Member</button>
</div>

</div>
</div>

<script>
const API = "https://YOUR_API_GATEWAY_URL";

async function redirect(url) {
    window.location.href = url;
}

function goFounder() {
    redirect(`${API}/gateway?product=founder`);
}

function goAccess() {
    redirect(`${API}/gateway?product=access`);
}

function goMembership() {
    redirect(`${API}/gateway?product=membership&plan=mid&term=monthly`);
}
</script>

</body>
</html>
