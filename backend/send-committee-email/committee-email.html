<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" class="notranslate">
<head>
  <meta name="google" content="notranslate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light only">
  <title>{{subject}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style type="text/css">
    body { margin: 0; padding: 0; width: 100% !important; background-color: #F5F2ED; }
    table { border-collapse: collapse; }
    img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    a { text-decoration: none; }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#F5F2ED;font-family:'Source Serif Pro',Georgia,serif;color:#0A0A0A;" translate="no">
  <div style="display:none;font-size:1px;color:#F5F2ED;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    {{preheader}}
  </div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F5F2ED;">
    <tr>
      <td align="center" style="padding:0 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;background-color:#FBF9F4;">
          <tr>
            <td align="center" style="background-color:#000000;padding:14px 56px;">
              <img src="https://presttige.net/assets/images/presttige-p-ring.png" alt="Presttige" width="40" height="40" style="display:block;margin:0 auto;">
            </td>
          </tr>
          <tr>
            <td style="padding:48px 56px 40px 56px;">
              <p style="margin:0 0 24px 0;font-family:'Source Serif Pro',Georgia,serif;font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#8C7040;">{{eyebrow}}</p>
              <h1 style="margin:0 0 28px 0;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:500;font-size:34px;line-height:42px;color:#0A0A0A;">{{headline}}</h1>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 32px 0;">
                <tr><td style="width:38px;border-top:1px solid #8C7040;font-size:0;line-height:0;height:1px;">&nbsp;</td></tr>
              </table>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 28px 0;">
                {{profile_rows}}
              </table>
              <p style="margin:0 0 10px 0;font-family:'Source Serif Pro',Georgia,serif;font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#8C7040;">Short Introduction</p>
              <p style="margin:0 0 24px 0;font-family:'Source Serif Pro',Georgia,serif;font-size:16px;line-height:26px;color:#4A4A4A;">{{short_introduction}}</p>
              <p style="margin:0 0 10px 0;font-family:'Source Serif Pro',Georgia,serif;font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#8C7040;">Why Presttige</p>
              <p style="margin:0 0 32px 0;font-family:'Source Serif Pro',Georgia,serif;font-size:16px;line-height:26px;color:#4A4A4A;">{{why_presttige}}</p>
              <div style="margin:0 0 32px 0;text-align:center;">
                {{photo_blocks}}
              </div>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 32px 0;">
                <tr>
                  <td align="center" style="padding:0 6px 0 0;">
                    <a href="{{review_url_approve}}" style="display:block;padding:14px 20px;border:1px solid #8C7040;color:#8C7040;font-family:'Source Serif Pro',Georgia,serif;font-size:12px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;">Approve</a>
                  </td>
                  <td align="center" style="padding:0 3px;">
                    <a href="{{review_url_reject}}" style="display:block;padding:14px 20px;border:1px solid #8C7040;color:#8C7040;font-family:'Source Serif Pro',Georgia,serif;font-size:12px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;">Reject</a>
                  </td>
                  <td align="center" style="padding:0 0 0 6px;">
                    <a href="{{review_url_standby}}" style="display:block;padding:14px 20px;border:1px solid #8C7040;color:#8C7040;font-family:'Source Serif Pro',Georgia,serif;font-size:12px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;">Standby</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-family:'Source Serif Pro',Georgia,serif;font-size:14px;line-height:22px;color:#4A4A4A;">View the full application and add a note here:
                <a href="{{review_url_view}}" style="color:#8C7040;text-decoration:underline;">{{review_url_view}}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 56px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="border-top:1px solid #D9D2C5;font-size:0;line-height:0;height:1px;">&nbsp;</td></tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="background-color:#000000;padding:9px 56px;">
              <img src="https://presttige.net/assets/images/presttige-p-ring.png" alt="Presttige" width="32" height="32" style="display:block;margin:0 auto;">
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
