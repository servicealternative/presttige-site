<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Email Confirmation</title>
  <link rel="shortcut icon" href="/favicon.ico?v=20260421d" type="image/x-icon" />
  <link rel="icon" href="/favicon.ico?v=20260421d" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260421d" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260421d" />
  <link rel="apple-touch-icon" href="/assets/images/presttige-favicon.png?v=20260421d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Source+Serif+Pro:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="/assets/js/consent-banner.js" defer></script>

  <style>
    :root {
      --primary: #0A0A0A;
      --background: #F5F2ED;
      --paper: #FBF9F4;
      --accent: #8C7040;
      --muted: #4A4A4A;
      --hairline: #D9D2C5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--background);
      color: var(--primary);
      font-family: "Source Serif Pro", Georgia, serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "liga" 1, "kern" 1;
    }

    .confirm-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 24px;
      background: var(--background);
    }

    .confirm-content {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    .confirm-eyebrow {
      font-family: "Source Serif Pro", Georgia, serif;
      font-size: 7.5pt;
      font-weight: 500;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .confirm-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 36pt;
      line-height: 1.15;
      color: var(--primary);
      margin-bottom: 32px;
      letter-spacing: -0.005em;
    }

    .confirm-divider {
      width: 38px;
      height: 0.5px;
      background: var(--accent);
      margin: 0 auto 32px auto;
      border: none;
    }

    .confirm-body {
      font-family: "Source Serif Pro", Georgia, serif;
      font-size: 11pt;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .confirm-email {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 17pt;
      color: var(--primary);
      display: block;
      margin: 6px 0 24px 0;
      letter-spacing: 0.005em;
      word-break: break-word;
    }

    .confirm-followup {
      font-family: "Source Serif Pro", Georgia, serif;
      font-style: italic;
      font-size: 10.5pt;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 48px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    .confirm-link {
      font-family: "Source Serif Pro", Georgia, serif;
      font-size: 8.5pt;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 0.5px solid var(--hairline);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .confirm-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="confirm-page">
    <div class="confirm-content">
      <div class="confirm-eyebrow">Verification sent</div>

      <h1 class="confirm-title">We've written to you.</h1>

      <hr class="confirm-divider" />

      <p class="confirm-body">
        A confirmation link has been sent to
        <span id="emailText" class="confirm-email">your@email.com</span>
      </p>

      <p class="confirm-followup">
        Open it at your convenience to confirm.<br />
        The Committee will review your application once you have.
      </p>

      <a href="/" class="confirm-link">Wrong email? Try again</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');

    if (email) {
      document.getElementById('emailText').textContent = email;
    }
  </script>
</body>
</html>
