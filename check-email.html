<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presttige — Check Your Email</title>
  <link rel="shortcut icon" href="/favicon.ico?v=20260421c" type="image/x-icon" />
  <link rel="icon" href="/favicon.ico?v=20260421c" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260421c" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260421c" />
  <link rel="apple-touch-icon" href="/assets/images/presttige-favicon.png?v=20260421c" />

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f4f1eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      width: min(100%, 560px);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 42px 30px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    p {
      color: rgba(244,241,235,0.74);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .email {
      color: #d1ae72;
      font-weight: 600;
      word-break: break-word;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #cfa96a 0%, #e1c28d 100%);
      color: #0d0d0d;
      font-weight: 600;
      margin-top: 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Check Your Email</h1>
    <p>We’ve sent a confirmation link to:</p>
    <p id="emailText" class="email">your email address</p>
    <p>Please confirm your email to continue your Presttige application.</p>
    <a class="btn" href="/">Return to Presttige</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');

    if (email) {
      document.getElementById('emailText').textContent = email;
    }
  </script>
</body>
</html>
